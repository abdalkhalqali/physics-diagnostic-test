<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبار تشخيصي - فيزياء</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="container">
    <a href="../index.html" class="back-link">← العودة</a>
    <h1>📝 اختبار تشخيصي سريع</h1>
    <form id="quiz">
        <div class="question"><p><strong>1. وحدة قياس القوة هي:</strong></p>
            <label><input type="radio" name="q1" value="A"> أ) نيوتن</label>
            <label><input type="radio" name="q1" value="B"> ب) جول</label>
        </div>
        <div class="question"><p><strong>2. قانون نيوتن الثاني هو:</strong></p>
            <label><input type="radio" name="q2" value="A"> أ) F = m × a</label>
            <label><input type="radio" name="q2" value="B"> ب) F = m / a</label>
        </div>
        <button type="button" onclick="gradeQuiz()">تصحيح</button>
    </form>
    <div id="resultMsg"></div>
</div>
<script>
    function gradeQuiz() {
        let score = 0;
        const q1 = document.querySelector('input[name="q1"]:checked');
        const q2 = document.querySelector('input[name="q2"]:checked');
        if(q1 && q1.value === 'A') score++;
        if(q2 && q2.value === 'A') score++;
        document.getElementById('resultMsg').innerHTML = `<h3>نتيجتك: ${score}/2</h3>`;
        // حفظ في LocalStorage (سيُستخدم لاحقاً في لوحة الطالب)
        localStorage.setItem('اختبار_تشخيصي', score);
    }
</script>
</body>
</html>
