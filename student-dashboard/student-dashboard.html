<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الطالب</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="container">
    <a href="../index.html" class="back-link">← العودة</a>
    <h1>📊 لوحة الطالب</h1>
    <div id="results"></div>
</div>
<script>
    const saved = localStorage.getItem('اختبار_تشخيصي');
    const div = document.getElementById('results');
    if(saved !== null) {
        div.innerHTML = `<p>آخر نتيجة اختبار: ${saved}/2</p>`;
    } else {
        div.innerHTML = `<p>✨ لم تختبر بعد. اذهبي إلى قسم الاختبارات التشخيصية. ✨</p>`;
    }
</script>
</body>
</html>
