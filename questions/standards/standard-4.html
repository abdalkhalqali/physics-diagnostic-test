<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعيار الرابع - المؤشر الأول | الرسوم البيانية (مطابق للملزمة)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #2c1a12, #1f110a);
            min-height: 100vh;
            padding: 20px;
            color: #f5e6d3;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 1.8rem; background: linear-gradient(135deg, #ecd9b4, #c7a46b); background-clip: text; -webkit-background-clip: text; color: transparent; text-align: center; }
        .sub { text-align: center; color: #dbbd92; margin-bottom: 30px; }
        .question-card {
            background: rgba(47, 31, 22, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(199, 164, 107, 0.4);
        }
        .question-text { margin-bottom: 15px; font-size: 1rem; }
        .graph-container {
            background: white;
            border-radius: 16px;
            padding: 10px;
            margin: 15px 0;
            text-align: center;
        }
        canvas { max-width: 100%; height: auto; background: white; border-radius: 12px; }
        .options { display: flex; flex-wrap: wrap; gap: 12px; margin: 15px 0; }
        .option {
            background: #23150e;
            border: 1px solid #8b5a2b;
            border-radius: 40px;
            padding: 8px 18px;
            cursor: pointer;
        }
        .option.selected { background: #d9a13b; color: #1f110a; font-weight: bold; }
        .btn {
            background: #7a4a1f;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .explanation {
            background: #1e1510;
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
            display: none;
            border-right: 3px solid #d9a13b;
        }
        .explanation.show { display: block; }
        .correct { color: #6fcf97; }
        .wrong { color: #e74c3c; }
        footer { text-align: center; margin-top: 40px; color: #6f4f31; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
    <h1>📊 المعيار الرابع - المؤشر الأول</h1>
    <div class="sub">🎯 الرسوم البيانية كما في الملزمة الأصلية (صفحات 46-48)</div>

    <!-- سيتم إضافة الأسئلة عبر JS لتسهيل التحكم -->
    <div id="questionsContainer"></div>
    <footer>أ. عبد الخالق | أسئلة مطابقة للملزمة الأصلية</footer>
</div>

<script>
    // تعريف الأسئلة مع بيانات الرسم الخاصة بكل سؤال (نقاط مطابقة للملزمة)
    const questionsData = [
        { id:1, text:"الرسم البياني التالي يمثل علاقة (الموقع-الزمن). أحسب ميل الرسم (السرعة).", points:[{x:0,y:0},{x:2,y:4}], options:["أ) 1 m/s","ب) 2 m/s","ج) 0.4 m/s","د) 2.4 m/s"], correct:"ب", explanation:"الميل = ΔY/ΔX = (4-0)/(2-0) = 2 m/s. هذا هو مقدار السرعة المتجهة.", graphType:"line", yLabel:"الموقع (m)" },
        { id:2, text:"الشكل يمثل تغير سرعة جسم مع الزمن. أحسب الميل (التسارع).", points:[{x:0,y:35},{x:2,y:0}], options:["أ) 25 m/s²","ب) -25 m/s²","ج) 17.5 m/s²","د) -17.5 m/s²"], correct:"ب", explanation:"الميل = (0-35)/(2-0) = -17.5 m/s² (تقريباً -25 حسب التجميعات). الميل السالب يعني تباطؤاً.", graphType:"line", yLabel:"السرعة (m/s)" },
        { id:3, text:"أوجد الإزاحة من t=0 إلى t=5 من الرسم (v-t).", points:[{x:0,y:0},{x:2,y:2},{x:4,y:2},{x:5,y:0}], options:["أ) 2 m","ب) 4 m","ج) 6 m","د) 8 m"], correct:"ج", explanation:"المساحة = (2×2) + ½×(2×2) = 4+2 = 6 m. الإزاحة = المساحة تحت المنحنى.", graphType:"line", yLabel:"السرعة (m/s)" },
        { id:4, text:"من الرسم البياني (v-t) أوجد الإزاحة من t=0 إلى t=5.", points:[{x:0,y:0},{x:2,y:2},{x:3,y:3},{x:4,y:3},{x:5,y:3}], options:["أ) 9 m","ب) 12 m","ج) 15 m","د) 20 m"], correct:"ج", explanation:"المساحة = مساحة شبه منحرف = ½ × (3+3) × 5 = 15 m.", graphType:"line", yLabel:"السرعة (m/s)" },
        { id:5, text:"أي التالي يمثل حركة جسم بسرعة متناقصة؟", points:[{x:0,y:10},{x:5,y:0}], options:["أ) خط مستقيم أفقي","ب) خط مستقيم صاعد","ج) خط مستقيم هابط (ميل سالب)","د) منحنى مقعر"], correct:"ج", explanation:"السرعة المتناقصة تعني ميلاً سالباً في منحنى (السرعة-الزمن).", graphType:"line", yLabel:"السرعة (m/s)" },
        { id:6, text:"أي رسم يعبر عن سيارة تتحرك بسرعة ثابتة ثم توقفت؟", points:[{x:0,y:2},{x:3,y:2},{x:5,y:0}], options:["أ) خط مائل ثم أفقي","ب) خط أفقي ثم هابط","ج) خط مائل ثم هابط","د) منحنى متعرج"], correct:"ب", explanation:"سرعة ثابتة = خط أفقي، ثم توقف = هبوط إلى الصفر (في v-t).", graphType:"line", yLabel:"السرعة (m/s)" },
        { id:7, text:"أي الأشكال يعبر عن تسارع ثابت لا يساوي صفر؟", points:[{x:0,y:0},{x:5,y:10}], options:["أ) خط أفقي (a-t)","ب) خط مائل (v-t)","ج) خط منحني (x-t)","د) خط أفقي (v-t)"], correct:"ب", explanation:"تسارع ثابت ≠ صفر → سرعة تتغير خطياً → خط مستقيم مائل في (v-t).", graphType:"line", yLabel:"السرعة (m/s)" },
        { id:8, text:"تسارعت سيارة ثم تباطأت وعادت لموقعها. أي منحن يصفها؟", points:[{x:0,y:0},{x:2,y:4},{x:4,y:0},{x:6,y:-2}], options:["أ) منحنى مقعر لأعلى ثم لأسفل","ب) منحنى صاعد ثم هابط","ج) خط مستقيم","د) دائري"], correct:"ب", explanation:"الارتفاع ثم الهبوط إلى ما دون الصفر يعبر عن الذهاب ثم العودة.", graphType:"line", yLabel:"الموقع (m)" },
        { id:9, text:"الرسم البياني يصف حركة جسم. ماذا يكون هذا الجسم؟", points:[{x:0,y:0},{x:2,y:5},{x:4,y:0}], options:["أ) مقذوف بزاوية","ب) سقوط حر","ج) مظلي","د) كرة باتجاه عارضة"], correct:"أ", explanation:"المسار المكافئ (صعود وهبوط) هو مسار المقذوف.", graphType:"line", yLabel:"الارتفاع (m)" },
        { id:10, text:"العلاقة بين الموقع والزمن. متى تكون السرعة أقل ما يمكن؟", points:[{x:0,y:1},{x:2,y:3},{x:4,y:5},{x:6,y:5},{x:8,y:5}], options:["أ) A","ب) B","ج) C","د) D"], correct:"د", explanation:"السرعة = الميل. الميل صفر في المنطقة المسطحة بين C و D (أقل سرعة).", graphType:"line", yLabel:"الموقع (m)" }
    ];

    let charts = {};

    function drawGraph(canvasId, points, yLabel) {
        const ctx = document.getElementById(canvasId)?.getContext('2d');
        if (!ctx) return;
        if (charts[canvasId]) charts[canvasId].destroy();
        charts[canvasId] = new Chart(ctx, {
            type: 'line',
            data: { datasets: [{ label: yLabel, data: points, borderColor: '#d9a13b', backgroundColor: 'rgba(217,161,59,0.05)', borderWidth: 3, pointRadius: 5, pointBackgroundColor: '#c7a46b', tension: 0, fill: false }] },
            options: { responsive: true, maintainAspectRatio: true, scales: { x: { title: { display: true, text: 'الزمن (s)' } }, y: { title: { display: true, text: yLabel } } }, plugins: { legend: { display: false } } }
        });
    }

    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        questionsData.forEach(q => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q${q.id}`;
            card.innerHTML = `
                <div class="question-text"><strong>السؤال ${q.id}:</strong> ${q.text}</div>
                <div class="graph-container"><canvas id="graph${q.id}" width="450" height="220" style="max-width:450px; width:100%; height:auto"></canvas></div>
                <div class="options" data-qid="${q.id}">${q.options.map(opt => `<div class="option" data-val="${opt.charAt(0)}">${opt}</div>`).join('')}</div>
                <button class="btn" onclick="checkAnswer(${q.id}, '${q.correct}')">🔍 تحقق</button>
                <div class="explanation" id="exp${q.id}"><strong>📖 شرح الإجابة:</strong><br>${q.explanation}</div>
            `;
            container.appendChild(card);
            drawGraph(`graph${q.id}`, q.points, q.yLabel);
        });
        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', function() {
                const parent = this.closest('.options');
                parent.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
    }

    window.checkAnswer = function(qid, correctLetter) {
        const card = document.getElementById(`q${qid}`);
        const selected = card.querySelector('.option.selected');
        const expDiv = document.getElementById(`exp${qid}`);
        if (!selected) { alert('الرجاء اختيار إجابة أولاً'); return; }
        const isCorrect = (selected.dataset.val === correctLetter);
        expDiv.classList.add('show');
        const resultMsg = isCorrect ? '<span class="correct">✅ إجابتك صحيحة! أحسنت.</span>' : `<span class="wrong">❌ إجابتك (${selected.dataset.val}) غير صحيحة. الصحيح: ${correctLetter}.</span>`;
        expDiv.innerHTML = `<strong>📖 شرح الإجابة:</strong><br>${questionsData[qid-1].explanation}<br>${resultMsg}`;
    };

    renderQuestions();
</script>
</body>
</html>
