<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الطالب | عبدالخالق فيزياء</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #2c1a12, #1f110a);
            min-height: 100vh;
            padding: 20px;
            color: #f5e6d3;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        h1 { font-size: 1.8rem; background: linear-gradient(135deg, #ecd9b4, #c7a46b); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .logout-btn { background: #5e3a1f; padding: 8px 20px; border-radius: 40px; color: #f5e6d3; border: none; cursor: pointer; }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card {
            background: rgba(47, 31, 22, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 20px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(199, 164, 107, 0.4);
            text-align: center;
        }
        .card:hover { background: #3d2a1f; transform: translateY(-3px); }
        .card h3 { color: #e9c48b; margin-bottom: 8px; }
        
        .selector-area {
            background: rgba(47, 31, 22, 0.85);
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(199, 164, 107, 0.4);
            text-align: center;
        }
        select, button {
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-family: inherit;
            margin: 5px;
        }
        select {
            background: #23150e;
            border: 1px solid #8b5a2b;
            color: #faeedb;
        }
        .btn {
            background: linear-gradient(95deg, #7a4a1f, #9b6737);
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        
        .exam-area {
            background: rgba(47, 31, 22, 0.9);
            border-radius: 28px;
            padding: 25px;
            margin-top: 20px;
            display: none;
        }
        .question-box {
            background: #1e1510;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
        }
        .graph-container {
            background: white;
            border-radius: 16px;
            padding: 10px;
            margin: 15px 0;
            text-align: center;
        }
        canvas { max-width: 100%; height: auto; background: white; border-radius: 12px; }
        .options { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        .option {
            background: #23150e;
            border: 1px solid #8b5a2b;
            border-radius: 60px;
            padding: 10px 18px;
            cursor: pointer;
        }
        .option.selected { background: #d9a13b; color: #1f110a; font-weight: bold; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 20px; }
        .result-card {
            background: #1e1510;
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
        }
        .wrong-item {
            border-right: 3px solid #e74c3c;
            padding: 10px;
            margin: 10px 0;
            background: #2a1a12;
        }
        footer { text-align: center; margin-top: 40px; color: #6f4f31; font-size: 0.75rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📘 لوحة الطالب – عبدالخالق فيزياء</h1>
        <button id="logoutBtn" class="logout-btn">🚪 خروج</button>
    </div>

    <div class="card-grid">
        <div class="card" onclick="showStandardSelector()"><h3>📚 اختبار حسب المعيار</h3><p>اختر المعيار (1-18)</p></div>
        <div class="card" onclick="startRandomExam()"><h3>🎲 اختبار عشوائي</h3><p>أسئلة من جميع المعايير</p></div>
        <div class="card" onclick="location.href='dictionary/index.html'"><h3>📖 القاموس الفيزيائي</h3></div>
        <div class="card" onclick="location.href='lessons/index.html'"><h3>🖼️ السبورة</h3></div>
    </div>

    <!-- منطقة اختيار المعيار -->
    <div id="standardSelector" class="selector-area" style="display: none;">
        <h3>اختر المعيار</h3>
        <select id="standardSelect">
            <option value="">-- اختر معيار --</option>
            <option value="1">المعيار 1: طبيعة العلم</option>
            <option value="2">المعيار 2: المنهج العلمي</option>
            <option value="3">المعيار 3: المختبرات والسلامة</option>
            <option value="4">المعيار 4: المهارات الرياضية والإحصائية</option>
            <option value="5">المعيار 5: الميكانيكا</option>
            <option value="6">المعيار 6: الموائع</option>
            <option value="7">المعيار 7: خواص المادة</option>
            <option value="8">المعيار 8: الكهرباء (قوة ومجال)</option>
            <option value="9">المعيار 9: التيار والدوائر</option>
            <option value="10">المعيار 10: المغناطيسية</option>
            <option value="11">المعيار 11: الحرارة والديناميكا</option>
            <option value="12">المعيار 12: الموجات والاهتزازات</option>
            <option value="13">المعيار 13: الضوء</option>
            <option value="14">المعيار 14: الفيزياء الحديثة</option>
            <option value="15">المعيار 15: الفيزياء النووية</option>
            <option value="16">المعيار 16: العلاقة بالعلوم الأخرى</option>
            <option value="17">المعيار 17: مهارات التدريس</option>
            <option value="18">المعيار 18: استراتيجيات التدريس والتقويم</option>
        </select>
        <button class="btn" onclick="loadStandardExam()">ابدأ الاختبار</button>
        <button class="btn" onclick="document.getElementById('standardSelector').style.display='none'" style="background:#5e3a1f;">إلغاء</button>
    </div>

    <div id="examArea" class="exam-area"></div>
</div>

<script>
    let currentQuestions = [];
    let currentIndex = 0;
    let userAnswers = [];
    let currentGraphs = {}; // لتخزين كائنات Chart.js لكل رسم

    // إظهار قائمة المعايير
    window.showStandardSelector = function() {
        document.getElementById('standardSelector').style.display = 'block';
        document.getElementById('examArea').style.display = 'none';
    };

    // تحميل اختبار حسب المعيار
    window.loadStandardExam = async function() {
        const standardId = document.getElementById('standardSelect').value;
        if (!standardId) {
            alert('الرجاء اختيار معيار أولاً');
            return;
        }
        document.getElementById('standardSelector').style.display = 'none';
        
        // محاولة تحميل ملف الأسئلة الخاص بالمعيار
        try {
            const response = await fetch(`questions/standards/standard-${standardId}.json`);
            if (!response.ok) throw new Error('الملف غير موجود');
            const data = await response.json();
            if (!data.questions || data.questions.length === 0) {
                alert('لا توجد أسئلة لهذا المعيار حالياً. سيتم إضافتها قريباً.');
                return;
            }
            startExam(data.questions);
        } catch (error) {
            console.error(error);
            alert(`⚠️ المعيار ${standardId} لا يحتوي على أسئلة بعد. الرجاء إضافة أسئلة من لوحة المالك أولاً.`);
        }
    };

    // اختبار عشوائي (تجريبي)
    window.startRandomExam = async function() {
        // مؤقتاً: نعرض رسالة
        alert('سيتم تفعيل الاختبار العشوائي قريباً. حالياً يمكنك تجربة الاختبار حسب المعيار.');
    };

    // بدء الاختبار بالأسئلة المحملة
    function startExam(questions) {
        currentQuestions = questions;
        currentIndex = 0;
        userAnswers = new Array(questions.length).fill(null);
        renderCurrentQuestion();
        document.getElementById('examArea').style.display = 'block';
    }

    // عرض السؤال الحالي مع رسمه البياني إن وجد
    function renderCurrentQuestion() {
        const q = currentQuestions[currentIndex];
        const area = document.getElementById('examArea');
        
        let graphHtml = '';
        if (q.graph && q.graph.points && q.graph.points.length > 0) {
            graphHtml = `
                <div class="graph-container">
                    <canvas id="graphCanvas_${currentIndex}" width="450" height="220" style="max-width:100%; height:auto"></canvas>
                </div>
            `;
        }
        
        let optionsHtml = '';
        q.options.forEach(opt => {
            const letter = opt.charAt(0);
            const isSelected = (userAnswers[currentIndex] === letter);
            optionsHtml += `<div class="option ${isSelected ? 'selected' : ''}" data-val="${letter}" onclick="selectOption(this, ${currentIndex}, '${letter}')">${opt}</div>`;
        });
        
        let html = `
            <h3>📝 السؤال ${currentIndex+1} من ${currentQuestions.length}</h3>
            <div class="question-box">
                <p><strong>${q.text}</strong></p>
                ${graphHtml}
                <div class="options" id="optionsContainer_${currentIndex}">${optionsHtml}</div>
                <div class="nav-buttons">
                    <button class="btn" onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled' : ''}>⟳ السابق</button>
                    <button class="btn" onclick="nextQuestion()">${currentIndex === currentQuestions.length-1 ? '🏁 إنهاء' : 'التالي →'}</button>
                </div>
            </div>
        `;
        
        area.innerHTML = html;
        
        // رسم الرسم البياني بعد ظهور الـ canvas
        if (q.graph && q.graph.points && q.graph.points.length > 0) {
            drawGraphForQuestion(q.graph, `graphCanvas_${currentIndex}`);
        }
    }
    
    function drawGraphForQuestion(graphData, canvasId) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        // تدمير الرسم السابق إن وجد
        if (currentGraphs[canvasId]) currentGraphs[canvasId].destroy();
        
        currentGraphs[canvasId] = new Chart(ctx, {
            type: graphData.type || 'line',
            data: {
                datasets: [{
                    label: graphData.yLabel || 'القيمة',
                    data: graphData.points,
                    borderColor: '#d9a13b',
                    backgroundColor: 'rgba(217,161,59,0.05)',
                    borderWidth: 3,
                    pointRadius: 5,
                    pointBackgroundColor: '#c7a46b',
                    tension: 0,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: {
                    x: { title: { display: true, text: graphData.xLabel || 'الزمن (s)' } },
                    y: { title: { display: true, text: graphData.yLabel || 'القيمة' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }
    
    window.selectOption = function(element, idx, value) {
        // تحديث الإجابة
        userAnswers[idx] = value;
        // تحديث الواجهة
        const container = document.getElementById(`optionsContainer_${idx}`);
        if (container) {
            Array.from(container.children).forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
        }
    };
    
    window.nextQuestion = function() {
        if (!userAnswers[currentIndex]) {
            alert('الرجاء اختيار إجابة قبل الانتقال');
            return;
        }
        if (currentIndex === currentQuestions.length - 1) {
            finishExam();
        } else {
            currentIndex++;
            renderCurrentQuestion();
        }
    };
    
    window.prevQuestion = function() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
        }
    };
    
    function finishExam() {
        let score = 0;
        let details = [];
        currentQuestions.forEach((q, idx) => {
            const isCorrect = (userAnswers[idx] === q.correct);
            if (isCorrect) score++;
            details.push({
                question: q.text,
                userAnswer: userAnswers[idx] || 'لم تجب',
                correctAnswer: q.correct,
                isCorrect: isCorrect,
                explanation: q.explanation || 'لا يوجد شرح'
            });
        });
        const percentage = Math.round((score / currentQuestions.length) * 100);
        
        let wrongHtml = '';
        details.filter(d => !d.isCorrect).forEach(d => {
            wrongHtml += `<div class="wrong-item"><strong>❌ ${d.question}</strong><br>إجابتك: ${d.userAnswer} | الصحيح: ${d.correctAnswer}<br>📘 ${d.explanation}</div>`;
        });
        
        let levelMsg = '';
        if (percentage >= 80) levelMsg = '🌟 ممتاز! أنتِ في الطريق الصحيح. 🌟';
        else if (percentage >= 60) levelMsg = '📚 جيد، لكن هناك مجال للتحسين. راجعي الأخطاء أدناه.';
        else levelMsg = '💪 لا تقلقي، هذا التشخيص يظهر لنا أين نركز. أنا معكِ خطوة بخطوة.';
        
        const resultHtml = `
            <div class="result-card">
                <h3>✅ نتيجتك: ${score}/${currentQuestions.length} (${percentage}%)</h3>
                <p>${levelMsg}</p>
                <h4>📋 تفصيل الأخطاء:</h4>
                ${wrongHtml || '<p style="color:#6fcf97;">✨ مذهلة! لا توجد أخطاء. أنتِ جاهزة للاختبار الحقيقي. ✨</p>'}
                <button class="btn" onclick="location.reload()">🔄 اختبار جديد</button>
            </div>
        `;
        
        document.getElementById('examArea').innerHTML = resultHtml;
        
        // حفظ النتيجة في LocalStorage
        const session = JSON.parse(localStorage.getItem('current_user_session'));
        if (session && session.email) {
            let results = JSON.parse(localStorage.getItem(`results_${session.email}`) || '[]');
            results.unshift({
                examType: 'standard',
                examId: document.getElementById('standardSelect').value,
                score: score,
                total: currentQuestions.length,
                percentage: percentage,
                date: new Date().toISOString()
            });
            localStorage.setItem(`results_${session.email}`, JSON.stringify(results));
        }
    }
    
    // التحقق من جلسة الطالب
    const session = localStorage.getItem('current_user_session');
    if (!session) window.location.href = 'index.html';
    const user = JSON.parse(session);
    if (user.role !== 'user') window.location.href = 'index.html';
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('current_user_session');
        window.location.href = 'index.html';
    });
</script>
</body>
</html>
