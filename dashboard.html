<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الطالب | عبدالخالق فيزياء</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #2c1a12, #1f110a);
            min-height: 100vh;
            padding: 30px;
            color: #f5e6d3;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 15px; }
        .logout-btn { background: #5e3a1f; padding: 8px 20px; border-radius: 40px; color: #f5e6d3; text-decoration: none; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; }
        .card { background: #2f1f16b3; backdrop-filter: blur(4px); border-radius: 32px; padding: 25px; border: 1px solid #c7a46b40; transition: 0.2s; }
        .card:hover { transform: translateY(-5px); background: #3d2a1f; border-color: #d9a13b; }
        h1 { font-size: 1.7rem; }
        .welcome { margin-bottom: 20px; font-size: 1.2rem; color: #e9c48b; }
        footer { margin-top: 50px; text-align: center; color: #8f6b44; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📘 لوحة الطالب</h1>
        <a href="#" id="logoutBtn" class="logout-btn">🚪 تسجيل خروج</a>
    </div>
    <div class="welcome" id="welcomeMsg"></div>
    <div class="card-grid">
        <div class="card"><h3>📖 القاموس الفيزيائي</h3><p>ابحث عن المصطلحات وتعرف على تعريفاتها</p><button class="btn" onclick="location.href='dictionary/index.html'">زيارة القاموس</button></div>
        <div class="card"><h3>🧪 السبورة</h3><p>دروس مصورة بخط اليد</p><button class="btn" onclick="location.href='lessons/coulomb.html'">الدروس</button></div>
        <div class="card"><h3>📝 اختبار تشخيصي</h3><p>قياس مستواك في الفيزياء</p><button class="btn" onclick="location.href='exams/diagnostic.html'">ابدأ الاختبار</button></div>
        <div class="card"><h3>📚 المعايير</h3><p>شرح وأسئلة حسب المعايير الـ18</p><button class="btn" onclick="location.href='standards.html'">استعراض</button></div>
    </div>
    <footer>أ. عبد الخالق | حيث تلتقي الفيزياء بالرومانسية</footer>
</div>
<style>.btn { background: #8b5a2b; border: none; padding: 10px 18px; border-radius: 40px; color: white; margin-top: 15px; cursor: pointer; }</style>
<script>
    const session = localStorage.getItem("current_user_session");
    if(!session) { window.location.href = "index.html"; }
    const user = JSON.parse(session);
    if(user.role !== "user") { window.location.href = "index.html"; }
    document.getElementById("welcomeMsg").innerHTML = `🌟 أهلاً بكِ, ${user.name || user.email} 🌟<br>💫 رحلتك في الفيزياء تبدأ من هنا 💫`;
    document.getElementById("logoutBtn").addEventListener("click", (e) => {
        e.preventDefault();
        localStorage.removeItem("current_user_session");
        window.location.href = "index.html";
    });
</script>
</body>
</html>
