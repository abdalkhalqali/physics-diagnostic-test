<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المالك | عبدالخالق فيزياء</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #2c1a12, #1f110a);
            min-height: 100vh;
            padding: 20px;
            color: #f5e6d3;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; }
        h1 { font-size: 1.8rem; background: linear-gradient(135deg, #ecd9b4, #c7a46b); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .logout-btn { background: #5e3a1f; padding: 8px 20px; border-radius: 40px; border: none; color: white; cursor: pointer; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #2f1f16b3; backdrop-filter: blur(4px); border-radius: 28px; padding: 20px; text-align: center; border: 1px solid #c7a46b40; }
        .stat-number { font-size: 2rem; font-weight: bold; color: #e9c48b; }
        .stat-label { font-size: 0.8rem; color: #c9ac82; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #8b5a2b; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; color: #c9ac82; padding: 10px 25px; cursor: pointer; border-radius: 40px; }
        .tab-btn.active { background: #8b5a2b; color: white; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        
        .section { background: #2f1f16b3; border-radius: 28px; padding: 25px; margin-bottom: 25px; border: 1px solid #c7a46b40; }
        .section-title { font-size: 1.3rem; margin-bottom: 20px; border-right: 4px solid #d9a13b; padding-right: 15px; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; color: #ecd9b4; font-weight: 500; }
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            background: #23150e;
            border: 1.5px solid #8b5a2b;
            border-radius: 16px;
            color: #faeedb;
            font-family: inherit;
        }
        textarea { resize: vertical; min-height: 80px; }
        .options-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .btn {
            background: linear-gradient(95deg, #7a4a1f, #9b6737);
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-sm { padding: 6px 15px; font-size: 0.75rem; }
        .btn-danger { background: linear-gradient(95deg, #8b2a2a, #b14444); }
        
        .canvas-area { background: #1e1510; border-radius: 20px; padding: 15px; margin: 15px 0; }
        canvas { border: 2px solid #8b5a2b; border-radius: 12px; background: white; cursor: crosshair; width: 100%; max-width: 500px; height: auto; }
        .draw-tools { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .color-row { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; margin: 10px 0; }
        .color-row input { width: 50px; padding: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 8px; text-align: right; border-bottom: 1px solid #8b5a2b; }
        th { color: #e9c48b; }
        .status-active { color: #6fcf97; }
        .status-banned { color: #e74c3c; }
        
        .graph-points-table { width: 100%; margin: 10px 0; }
        .graph-points-table td { padding: 5px; border: none; }
        footer { text-align: center; margin-top: 30px; color: #6f4f31; }
        @media (max-width: 700px) { .options-row { grid-template-columns: 1fr; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🛡️ لوحة المالك – عبدالخالق فيزياء</h1>
        <button id="logoutBtn" class="logout-btn">🚪 خروج</button>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
    
    <div class="tabs">
        <button class="tab-btn active" data-tab="questions">📝 إدارة الأسئلة</button>
        <button class="tab-btn" data-tab="users">👥 إدارة المستخدمين</button>
        <button class="tab-btn" data-tab="settings">⚙️ الإعدادات</button>
    </div>
    
    <!-- تبويب الأسئلة -->
    <div id="tab-questions" class="tab-pane active">
        <div class="section">
            <div class="section-title">➕ إضافة / تعديل سؤال</div>
            <form id="questionForm">
                <input type="hidden" id="editMode" value="false">
                <input type="hidden" id="editQuestionId" value="">
                
                <div class="form-group"><label>نص السؤال</label><textarea id="qText" required></textarea></div>
                <div class="options-row">
                    <div class="form-group"><label>الخيار أ</label><input type="text" id="optA" required></div>
                    <div class="form-group"><label>الخيار ب</label><input type="text" id="optB" required></div>
                    <div class="form-group"><label>الخيار ج</label><input type="text" id="optC" required></div>
                    <div class="form-group"><label>الخيار د</label><input type="text" id="optD" required></div>
                </div>
                <div class="options-row">
                    <div class="form-group"><label>الإجابة الصحيحة</label><select id="correct"><option value="أ">أ</option><option value="ب">ب</option><option value="ج">ج</option><option value="د">د</option></select></div>
                    <div class="form-group"><label>المعيار (1-18)</label><input type="number" id="standard" min="1" max="18" required></div>
                    <div class="form-group"><label>المادة</label><select id="subject"><option value="mechanics">الميكانيكا</option><option value="electricity">الكهرباء والمغناطيس</option><option value="heat_waves">الحرارة والموجات</option><option value="modern">الفيزياء الحديثة</option></select></div>
                    <div class="form-group"><label>الصعوبة</label><select id="difficulty"><option value="easy">سهل</option><option value="medium">متوسط</option><option value="hard">صعب</option><option value="very_hard">صعب جداً</option></select></div>
                </div>
                <div class="form-group"><label>شرح الإجابة</label><textarea id="explanation" placeholder="سبب صحة الإجابة..."></textarea></div>
                
                <!-- الرسم البياني -->
                <div class="canvas-area">
                    <label>📈 الرسم البياني (اختياري)</label>
                    <canvas id="graphCanvas" width="500" height="250" style="max-width:500px; width:100%; height:auto"></canvas>
                    <div class="draw-tools">
                        <button type="button" id="clearCanvas" class="btn-sm">🗑️ مسح الرسم</button>
                        <button type="button" id="saveDrawing" class="btn-sm">💾 حفظ الرسم الحالي</button>
                        <button type="button" id="uploadBtn" class="btn-sm">📁 رفع صورة</button>
                        <input type="file" id="uploadImage" accept="image/*" style="display:none">
                    </div>
                    <div class="color-row">
                        <span>🎨 ألوان الرسم:</span>
                        <label>الخط: <input type="color" id="lineColor" value="#d9a13b"></label>
                        <label>النقاط: <input type="color" id="pointColor" value="#c7a46b"></label>
                        <label>التعبئة: <input type="color" id="fillColor" value="rgba(217,161,59,0.1)"></label>
                    </div>
                    <div id="graphPointsEditor"></div>
                    <input type="hidden" id="graphData">
                </div>
                
                <button type="submit" class="btn">💾 حفظ السؤال</button>
                <button type="button" id="cancelEdit" class="btn" style="background:#5e3a1f; display:none;">❌ إلغاء التعديل</button>
            </form>
        </div>
        
        <div class="section">
            <div class="section-title">📋 قائمة الأسئلة</div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                <select id="filterStandard"><option value="">كل المعايير</option></select>
                <select id="filterSubject"><option value="">كل المواد</option><option value="mechanics">الميكانيكا</option><option value="electricity">الكهرباء</option><option value="heat_waves">الحرارة والموجات</option><option value="modern">الفيزياء الحديثة</option></select>
                <select id="filterDifficulty"><option value="">كل الصعوبات</option><option value="easy">سهل</option><option value="medium">متوسط</option><option value="hard">صعب</option><option value="very_hard">صعب جداً</option></select>
                <button id="applyFilter" class="btn-sm">🔍 بحث</button>
            </div>
            <div id="questionsList"></div>
        </div>
    </div>
    
    <!-- تبويب المستخدمين -->
    <div id="tab-users" class="tab-pane">
        <div class="section"><div class="section-title">👥 المستخدمون المسجلون</div><div id="usersList"></div></div>
    </div>
    
    <!-- تبويب الإعدادات -->
    <div id="tab-settings" class="tab-pane">
        <div class="section">
            <div class="section-title">⚙️ إعدادات التخزين (GitHub Gist)</div>
            <div class="form-group"><label>رابط Gist الرئيسي</label><input type="text" id="gistBaseUrl" placeholder="https://gist.githubusercontent.com/.../raw/"></div>
            <div class="form-group"><label>GitHub Token</label><input type="password" id="githubToken" placeholder="ghp_xxxxxx"></div>
            <button id="saveSettings" class="btn">💾 حفظ</button>
            <hr style="margin: 20px 0; border-color:#8b5a2b;">
            <button id="backupData" class="btn">📥 نسخ احتياطي</button>
            <button id="restoreData" class="btn btn-danger">📂 استعادة من نسخة</button>
            <input type="file" id="restoreFile" accept=".json" style="display:none">
        </div>
    </div>
    <footer>أ. عبد الخالق | إدارة كاملة للأسئلة والرسوم البيانية</footer>
</div>

<script>
    // ------------------- إعدادات Gist -------------------
    let GIST_BASE_URL = localStorage.getItem('gist_base_url') || '';
    let GITHUB_TOKEN = localStorage.getItem('github_token') || '';
    let GIST_ID = '';
    
    // بيانات الأسئلة (سيتم تحميلها من Gist)
    let questionsDB = { standards: {}, subjects: {} };
    let usersDB = { users: [] };
    let resultsDB = { results: [] };
    
    // بيانات الرسم البياني الحالي
    let graphPoints = [];
    let graphChart = null;
    let editMode = false;
    let editingQuestionId = null;
    let editingOriginalStandard = null;
    let editingOriginalSubject = null;
    let editingOriginalDifficulty = null;
    
    // ------------------- دوال الرسم -------------------
    function initCanvas() {
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 250;
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        graphPoints = [{x:0, y:0}, {x:2, y:4}];
        renderGraphPointsTable();
        renderGraphPreview();
    }
    
    function renderGraphPreview() {
        const canvas = document.getElementById('graphCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (graphChart) graphChart.destroy();
        const lineColor = document.getElementById('lineColor').value;
        const pointColor = document.getElementById('pointColor').value;
        const fillColor = document.getElementById('fillColor').value;
        graphChart = new Chart(ctx, {
            type: 'line',
            data: { datasets: [{ data: graphPoints, borderColor: lineColor, backgroundColor: fillColor, borderWidth: 3, pointRadius: 5, pointBackgroundColor: pointColor, tension: 0, fill: true }] },
            options: { responsive: true, maintainAspectRatio: true, scales: { x: { title: { display: true, text: 'الزمن (s)' } }, y: { title: { display: true, text: 'القيمة' } } }, plugins: { legend: { display: false } } }
        });
        document.getElementById('graphData').value = JSON.stringify({ points: graphPoints, lineColor, pointColor, fillColor });
    }
    
    function renderGraphPointsTable() {
        let html = '<table class="graph-points-table"><tr><th>#</th><th>الزمن (x)</th><th>القيمة (y)</th><th></th></tr>';
        graphPoints.forEach((p, idx) => {
            html += `<tr><td>${idx+1}</td><td><input type="number" step="any" value="${p.x}" class="point-x" data-idx="${idx}" style="width:70px"></td>
                    <td><input type="number" step="any" value="${p.y}" class="point-y" data-idx="${idx}" style="width:70px"></td>
                    <td><button type="button" class="btn-sm" onclick="removeGraphPoint(${idx})">🗑️</button></td></tr>`;
        });
        html += `<tr><td colspan="4"><button type="button" id="addPointBtn" class="btn-sm">➕ إضافة نقطة</button></td></tr>`;
        document.getElementById('graphPointsEditor').innerHTML = html;
        document.querySelectorAll('.point-x').forEach(inp => inp.addEventListener('change', function() { graphPoints[this.dataset.idx].x = parseFloat(this.value); renderGraphPreview(); }));
        document.querySelectorAll('.point-y').forEach(inp => inp.addEventListener('change', function() { graphPoints[this.dataset.idx].y = parseFloat(this.value); renderGraphPreview(); }));
        document.getElementById('addPointBtn')?.addEventListener('click', () => { graphPoints.push({x:0, y:0}); renderGraphPointsTable(); renderGraphPreview(); });
    }
    
    window.removeGraphPoint = function(idx) { if(graphPoints.length > 1) { graphPoints.splice(idx,1); renderGraphPointsTable(); renderGraphPreview(); } else alert("يجب بقاء نقطة واحدة على الأقل"); };
    
    // ------------------- دوال تحميل وحفظ البيانات -------------------
    async function loadAllData() { /* سيتم تنفيذها عند ربط Gist */ }
    async function saveQuestionToFiles(question, standardId, subjectId, difficulty, isEdit, oldStandard, oldSubject, oldDifficulty) { /* حفظ في ملفات JSON */ }
    
    // ------------------- عرض قائمة الأسئلة -------------------
    function renderQuestionsList() {
        let html = `<table><thead><th>ID</th><th>نص السؤال</th><th>المعيار</th><th>المادة</th><th>الصعوبة</th><th>الإجراءات</th></thead><tbody>`;
        for(let std in questionsDB.standards) {
            let stdData = questionsDB.standards[std];
            if(!stdData.questions) continue;
            for(let diff of ['easy','medium','hard','very_hard']) {
                (stdData.questions[diff] || []).forEach((q, idx) => {
                    html += `<tr><td>${q.id}</td><td>${q.text.substring(0,50)}...</td><td>${std}</td><td>${q.subject||'-'}</td><td>${diff}</td>
                    <td><button class="btn-sm" onclick="editQuestion('${std}', '${diff}', ${idx})">✏️ تعديل</button>
                    <button class="btn-sm btn-danger" onclick="deleteQuestion('${std}', '${diff}', ${idx})">🗑️ حذف</button></td></tr>`;
                });
            }
        }
        html += `</tbody></table>`;
        document.getElementById('questionsList').innerHTML = html;
    }
    
    // ------------------- تعديل سؤال -------------------
    window.editQuestion = function(standard, difficulty, idx) {
        const q = questionsDB.standards[standard].questions[difficulty][idx];
        document.getElementById('editMode').value = 'true';
        document.getElementById('editQuestionId').value = q.id;
        editingQuestionId = q.id;
        editingOriginalStandard = standard;
        editingOriginalSubject = q.subject;
        editingOriginalDifficulty = difficulty;
        document.getElementById('qText').value = q.text;
        document.getElementById('optA').value = q.options[0];
        document.getElementById('optB').value = q.options[1];
        document.getElementById('optC').value = q.options[2];
        document.getElementById('optD').value = q.options[3];
        document.getElementById('correct').value = q.correct;
        document.getElementById('standard').value = standard;
        document.getElementById('subject').value = q.subject;
        document.getElementById('difficulty').value = difficulty;
        document.getElementById('explanation').value = q.explanation || '';
        if(q.graph && q.graph.points) {
            graphPoints = q.graph.points;
            document.getElementById('lineColor').value = q.graph.lineColor || '#d9a13b';
            document.getElementById('pointColor').value = q.graph.pointColor || '#c7a46b';
            document.getElementById('fillColor').value = q.graph.fillColor || 'rgba(217,161,59,0.1)';
            renderGraphPointsTable();
            renderGraphPreview();
        } else { initCanvas(); }
        document.getElementById('cancelEdit').style.display = 'inline-block';
        alert('يمكنك الآن تعديل السؤال ثم الضغط على حفظ');
    };
    
    document.getElementById('cancelEdit').addEventListener('click', () => {
        document.getElementById('editMode').value = 'false';
        document.getElementById('editQuestionId').value = '';
        editingQuestionId = null;
        document.getElementById('cancelEdit').style.display = 'none';
        document.getElementById('questionForm').reset();
        initCanvas();
    });
    
    // ------------------- إضافة/تعديل سؤال -------------------
    document.getElementById('questionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const question = {
            id: document.getElementById('editMode').value === 'true' ? parseInt(document.getElementById('editQuestionId').value) : Date.now(),
            text: document.getElementById('qText').value,
            options: [document.getElementById('optA').value, document.getElementById('optB').value, document.getElementById('optC').value, document.getElementById('optD').value],
            correct: document.getElementById('correct').value,
            subject: document.getElementById('subject').value,
            difficulty: document.getElementById('difficulty').value,
            explanation: document.getElementById('explanation').value,
            graph: JSON.parse(document.getElementById('graphData').value || '{}'),
            createdAt: new Date().toISOString()
        };
        const standard = parseInt(document.getElementById('standard').value);
        const subject = document.getElementById('subject').value;
        const difficulty = document.getElementById('difficulty').value;
        
        if(document.getElementById('editMode').value === 'true') {
            // حذف السؤال القديم من الموقع القديم
            if(editingOriginalStandard && questionsDB.standards[editingOriginalStandard]?.questions[editingOriginalDifficulty]) {
                const oldArr = questionsDB.standards[editingOriginalStandard].questions[editingOriginalDifficulty];
                const oldIdx = oldArr.findIndex(q => q.id === editingQuestionId);
                if(oldIdx !== -1) oldArr.splice(oldIdx,1);
            }
            if(editingOriginalSubject && questionsDB.subjects[editingOriginalSubject]?.questions[editingOriginalDifficulty]) {
                const oldSubArr = questionsDB.subjects[editingOriginalSubject].questions[editingOriginalDifficulty];
                const oldSubIdx = oldSubArr.findIndex(q => q.id === editingQuestionId);
                if(oldSubIdx !== -1) oldSubArr.splice(oldSubIdx,1);
            }
        }
        // حفظ في المعيار
        if(!questionsDB.standards[standard]) questionsDB.standards[standard] = { standardId: standard, questions: { easy:[], medium:[], hard:[], very_hard:[] } };
        questionsDB.standards[standard].questions[difficulty].push(question);
        // حفظ في المادة
        if(!questionsDB.subjects[subject]) questionsDB.subjects[subject] = { subjectId: subject, questions: { easy:[], medium:[], hard:[], very_hard:[] } };
        questionsDB.subjects[subject].questions[difficulty].push(question);
        
        alert('تم حفظ السؤال بنجاح');
        document.getElementById('editMode').value = 'false';
        document.getElementById('editQuestionId').value = '';
        document.getElementById('cancelEdit').style.display = 'none';
        document.getElementById('questionForm').reset();
        initCanvas();
        renderQuestionsList();
        updateStats();
    });
    
    // ------------------- حذف سؤال -------------------
    window.deleteQuestion = function(standard, difficulty, idx) {
        if(confirm('هل أنت متأكد من حذف هذا السؤال؟')) {
            questionsDB.standards[standard].questions[difficulty].splice(idx,1);
            renderQuestionsList();
            updateStats();
            alert('تم الحذف');
        }
    };
    
    // ------------------- إحصائيات -------------------
    function updateStats() {
        let totalQ = 0;
        for(let std in questionsDB.standards) {
            for(let diff of ['easy','medium','hard','very_hard']) totalQ += (questionsDB.standards[std].questions[diff] || []).length;
        }
        document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><div class="stat-number">${totalQ}</div><div class="stat-label">📝 إجمالي الأسئلة</div></div>
        <div class="stat-card"><div class="stat-number">${usersDB.users?.length || 0}</div><div class="stat-label">👥 المستخدمين</div></div>
        <div class="stat-card"><div class="stat-number">${resultsDB.results?.length || 0}</div><div class="stat-label">📊 الاختبارات</div></div>`;
    }
    
    // ------------------- ربط الأحداث -------------------
    document.getElementById('clearCanvas').addEventListener('click', () => { graphPoints = [{x:0,y:0},{x:2,y:4}]; renderGraphPointsTable(); renderGraphPreview(); });
    document.getElementById('saveDrawing').addEventListener('click', () => { alert('تم حفظ الرسم'); renderGraphPreview(); });
    document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('uploadImage').click());
    document.getElementById('uploadImage').addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('graphCanvas');
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                graphPoints = []; // لو رفع صورة، نعطل وضع النقاط (أو يمكن تحويلها إلى نقاط حسب الحاجة)
                renderGraphPreview();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });
    
    document.getElementById('saveSettings').addEventListener('click', () => {
        GIST_BASE_URL = document.getElementById('gistBaseUrl').value;
        GITHUB_TOKEN = document.getElementById('githubToken').value;
        localStorage.setItem('gist_base_url', GIST_BASE_URL);
        localStorage.setItem('github_token', GITHUB_TOKEN);
        alert('تم حفظ الإعدادات');
    });
    
    document.getElementById('applyFilter').addEventListener('click', () => renderQuestionsList());
    document.getElementById('backupData').addEventListener('click', () => {
        const all = { questions: questionsDB, users: usersDB, results: resultsDB };
        const blob = new Blob([JSON.stringify(all,null,2)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click();
    });
    document.getElementById('restoreData').addEventListener('click', () => document.getElementById('restoreFile').click());
    document.getElementById('restoreFile').addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            const restored = JSON.parse(event.target.result);
            if(restored.questions) questionsDB = restored.questions;
            if(restored.users) usersDB = restored.users;
            if(restored.results) resultsDB = restored.results;
            alert('تمت الاستعادة');
            renderQuestionsList();
            updateStats();
        };
        reader.readAsText(file);
    });
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        });
    });
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('current_user_session');
        window.location.href = 'index.html';
    });
    
    // تهيئة أولية
    const session = localStorage.getItem('current_user_session');
    if(!session) window.location.href = 'index.html';
    const user = JSON.parse(session);
    if(user.role !== 'admin') window.location.href = 'index.html';
    
    // تحميل بيانات تجريبية (سيتم استبدالها بـ Gist لاحقاً)
    questionsDB = { standards: {}, subjects: {} };
    initCanvas();
    renderQuestionsList();
    updateStats();
</script>
</body>
</html>
