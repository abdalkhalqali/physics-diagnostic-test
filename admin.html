<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>لوحة المالك - إدارة أسئلة المعيار الرابع | عبدالخالق فيزياء</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Tajawal', system-ui, sans-serif;
            background: radial-gradient(circle at 10% 20%, #2c1a12, #0f0906);
            min-height: 100vh;
            padding: 25px;
            color: #f5e6d3;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        h1 { font-size: 2rem; background: linear-gradient(135deg, #f3e0be, #d4a55a); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .logout-btn { background: #5e3a1f; padding: 10px 25px; border-radius: 40px; border: none; color: #f5e6d3; font-weight: bold; cursor: pointer; }
        .section { background: rgba(47, 31, 22, 0.85); backdrop-filter: blur(12px); border-radius: 48px; padding: 28px; margin-bottom: 30px; border: 1px solid rgba(199, 164, 107, 0.5); }
        .section-title { font-size: 1.5rem; margin-bottom: 25px; border-right: 5px solid #e9b85c; padding-right: 20px; }
        .btn { background: linear-gradient(95deg, #7a4a1f, #a16f3a); border: none; padding: 10px 24px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; }
        .btn-sm { padding: 6px 16px; font-size: 0.75rem; }
        .btn-danger { background: linear-gradient(95deg, #8b2a2a, #b14444); }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 10px; text-align: right; border-bottom: 1px solid #8b5a2b; }
        th { color: #e9c48b; }
        .edit-panel { display: none; margin-top: 30px; padding: 25px; background: #1e1510; border-radius: 48px; border: 2px solid #d9a13b; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .full-width { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: bold; color: #ecd9b4; }
        input, select, textarea { background: #23150e; border: 1.5px solid #8b5a2b; border-radius: 28px; padding: 12px 18px; color: #faeedb; width: 100%; }
        .canvas-card { background: #0f0906; border-radius: 32px; padding: 20px; margin: 20px 0; }
        canvas { background: white; border-radius: 24px; cursor: crosshair; max-width: 100%; }
        .draw-tools, .color-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 15px 0; align-items: center; }
        footer { text-align: center; margin-top: 40px; color: #8b6a48; }
        @media (max-width: 800px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🛡️ إدارة أسئلة المعيار الرابع (الرسوم البيانية)</h1>
        <button id="logoutBtn" class="logout-btn">🚪 خروج</button>
    </div>
    
    <div class="section">
        <div class="section-title">📋 الأسئلة (المعيار 4)</div>
        <div class="filter-bar" style="display: flex; gap: 15px; margin-bottom: 20px;">
            <button id="loadQuestionsBtn" class="btn">📂 تحميل الأسئلة من standard-4.json</button>
            <button id="addNewBtn" class="btn" style="background:#d4a55a;">➕ إضافة سؤال جديد</button>
        </div>
        <div id="questionsTableContainer" class="table-wrapper">
            <div style="text-align: center; padding: 40px;">⚠️ اضغط "تحميل الأسئلة" لعرضها</div>
        </div>
    </div>
    
    <div id="editPanel" class="edit-panel">
        <div class="section-title">✏️ تحرير السؤال</div>
        <form id="questionForm">
            <input type="hidden" id="editMode" value="false">
            <input type="hidden" id="editQuestionId" value="">
            <input type="hidden" id="editQuestionIndex" value="">
            <div class="form-grid">
                <div class="form-group full-width"><label>📝 نص السؤال</label><textarea id="qText" rows="3" required></textarea></div>
                <div class="form-group"><label>أ) الخيار الأول</label><input type="text" id="optA" required></div>
                <div class="form-group"><label>ب) الخيار الثاني</label><input type="text" id="optB" required></div>
                <div class="form-group"><label>ج) الخيار الثالث</label><input type="text" id="optC" required></div>
                <div class="form-group"><label>د) الخيار الرابع</label><input type="text" id="optD" required></div>
                <div class="form-group"><label>✅ الإجابة الصحيحة</label><select id="correct"><option value="أ">أ</option><option value="ب">ب</option><option value="ج">ج</option><option value="د">د</option></select></div>
                <div class="form-group"><label>⭐ الصعوبة</label><select id="difficulty"><option value="easy">سهل</option><option value="medium">متوسط</option><option value="hard">صعب</option><option value="very_hard">صعب جداً</option></select></div>
                <div class="form-group full-width"><label>💡 شرح الإجابة</label><textarea id="explanation" rows="2"></textarea></div>
            </div>
            
            <div class="canvas-card">
                <div>📈 الرسم البياني (نقاط)</div>
                <canvas id="graphCanvas" width="500" height="250"></canvas>
                <div class="draw-tools">
                    <button type="button" id="clearCanvas" class="btn-sm">🗑️ مسح</button>
                    <button type="button" id="undoDraw" class="btn-sm">↩️ تراجع</button>
                </div>
                <div class="color-row">
                    <label>لون الخط: <input type="color" id="lineColor" value="#d9a13b"></label>
                    <label>لون النقاط: <input type="color" id="pointColor" value="#c7a46b"></label>
                    <label>لون التعبئة: <input type="color" id="fillColor" value="#f5e6d3"></label>
                </div>
                <div id="graphPointsEditor"></div>
                <input type="hidden" id="graphData">
            </div>
            
            <div style="display: flex; gap: 18px; justify-content: flex-end;">
                <button type="submit" class="btn">💾 حفظ التعديلات</button>
                <button type="button" id="cancelEdit" class="btn" style="background:#5e3a1f;">❌ إلغاء</button>
            </div>
        </form>
    </div>
    <footer>✨ يقرأ الأسئلة مباشرة من ملف questions/standards/standard-4.json ✨</footer>
</div>

<script>
    let currentQuestions = [];      // الأسئلة المحملة من الملف
    let editingIndex = null;        // فهرس السؤال الجاري تعديله
    
    // ------------------- الرسم -------------------
    let graphPoints = [];
    let graphChart = null;
    let isDrawing = false, lastX, lastY;
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 500; canvas.height = 250;
    ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.lineWidth = 2;
    
    function renderGraph() {
        if(graphChart) graphChart.destroy();
        if(!graphPoints.length) { graphChart = null; return; }
        graphChart = new Chart(ctx, {
            type: 'line',
            data: { datasets: [{ data: graphPoints, borderColor: document.getElementById('lineColor').value, backgroundColor: document.getElementById('fillColor').value, pointBackgroundColor: document.getElementById('pointColor').value, tension: 0, fill: true }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { x: { title: { display: true, text: 'المحور X' } }, y: { title: { display: true, text: 'المحور Y' } } } }
        });
        document.getElementById('graphData').value = JSON.stringify({ points: graphPoints });
    }
    
    function renderPointsTable() {
        let html = '<table><thead><th>#</th><th>X</th><th>Y</th><th></th></thead><tbody>';
        graphPoints.forEach((p,i) => {
            html += `<tr><td>${i+1}</td>
                     <td><input type="number" class="px-${i}" value="${p.x}" style="width:80px"></td>
                     <td><input type="number" class="py-${i}" value="${p.y}" style="width:80px"></td>
                     <td><button type="button" class="btn-sm" onclick="removePoint(${i})">🗑️</button></td>
                </tr>`;
        });
        html += `<tr><td colspan="4"><button type="button" id="addPointBtn" class="btn-sm">➕ إضافة نقطة</button></td></tr>`;
        html += `</tbody></table>`;
        document.getElementById('graphPointsEditor').innerHTML = html;
        for(let i=0; i<graphPoints.length; i++) {
            document.querySelector(`.px-${i}`)?.addEventListener('change', (e) => { graphPoints[i].x = parseFloat(e.target.value); renderGraph(); });
            document.querySelector(`.py-${i}`)?.addEventListener('change', (e) => { graphPoints[i].y = parseFloat(e.target.value); renderGraph(); });
        }
        document.getElementById('addPointBtn')?.addEventListener('click', () => { graphPoints.push({x:0,y:0}); renderPointsTable(); renderGraph(); });
    }
    window.removePoint = (idx) => { if(graphPoints.length>1) { graphPoints.splice(idx,1); renderPointsTable(); renderGraph(); } else alert('يجب وجود نقطة واحدة على الأقل'); };
    
    function startDraw(e) { isDrawing = true; let pos = getPos(e); lastX = pos.x; lastY = pos.y; ctx.beginPath(); ctx.moveTo(lastX, lastY); }
    function drawMove(e) { if(!isDrawing) return; let pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); lastX = pos.x; lastY = pos.y; }
    function endDraw() { isDrawing = false; }
    function getPos(e) {
        let rect = canvas.getBoundingClientRect();
        let scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left)*scaleX, y: (clientY - rect.top)*scaleY };
    }
    canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', drawMove); canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e.touches[0]); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); drawMove(e.touches[0]); });
    canvas.addEventListener('touchend', endDraw);
    document.getElementById('clearCanvas').addEventListener('click', () => { ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height); graphPoints = []; renderPointsTable(); renderGraph(); });
    document.getElementById('undoDraw').addEventListener('click', () => { ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height); });
    
    // ------------------- تحميل وعرض الأسئلة -------------------
    async function loadQuestions() {
        try {
            const response = await fetch('questions/standards/standard-4.json');
            if (!response.ok) throw new Error('الملف غير موجود');
            const data = await response.json();
            if (data.questions && Array.isArray(data.questions)) {
                currentQuestions = data.questions;
                displayQuestions();
                alert(`تم تحميل ${currentQuestions.length} سؤال من الملف بنجاح`);
            } else {
                throw new Error('الملف لا يحتوي على مصفوفة questions');
            }
        } catch (error) {
            console.error(error);
            alert('❌ فشل تحميل الملف. تأكد من وجود questions/standards/standard-4.json');
            currentQuestions = [];
            displayQuestions();
        }
    }
    
    function displayQuestions() {
        if(!currentQuestions.length) {
            document.getElementById('questionsTableContainer').innerHTML = '<div class="section" style="text-align:center">⚠️ لا توجد أسئلة. اضغط "تحميل الأسئلة" أولاً.</div>';
            return;
        }
        let html = `<table><thead><th>ID</th><th>نص السؤال</th><th>الصعوبة</th><th>العمليات</th></thead><tbody>`;
        currentQuestions.forEach((q, idx) => {
            html += `<tr>
                <td>${q.id || idx+1}</td>
                <td>${(q.text || '').substring(0, 80)}...</td>
                <td>${q.difficulty || 'متوسط'}</td>
                <td>
                    <button class="btn-sm" onclick='editQuestion(${idx})'>✏️ تعديل</button>
                    <button class="btn-sm btn-danger" onclick='deleteQuestion(${idx})'>🗑️ حذف</button>
                </td>
            </tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('questionsTableContainer').innerHTML = html;
    }
    
    window.editQuestion = (idx) => {
        const q = currentQuestions[idx];
        editingIndex = idx;
        document.getElementById('editMode').value = 'true';
        document.getElementById('editQuestionIndex').value = idx;
        document.getElementById('qText').value = q.text || '';
        document.getElementById('optA').value = (q.options && q.options[0]) || '';
        document.getElementById('optB').value = (q.options && q.options[1]) || '';
        document.getElementById('optC').value = (q.options && q.options[2]) || '';
        document.getElementById('optD').value = (q.options && q.options[3]) || '';
        document.getElementById('correct').value = q.correct || 'أ';
        document.getElementById('difficulty').value = q.difficulty || 'medium';
        document.getElementById('explanation').value = q.explanation || '';
        if (q.graph && q.graph.points) {
            graphPoints = q.graph.points;
        } else {
            graphPoints = [{x:0,y:0}, {x:2,y:4}];
        }
        renderPointsTable();
        renderGraph();
        document.getElementById('editPanel').style.display = 'block';
        document.getElementById('editPanel').scrollIntoView({ behavior: 'smooth' });
    };
    
    window.deleteQuestion = (idx) => {
        if(confirm('⚠️ هل أنت متأكد من حذف هذا السؤال نهائياً؟')) {
            currentQuestions.splice(idx, 1);
            displayQuestions();
            alert('تم الحذف مؤقتاً. لحفظ التغييرات نهائياً، يجب ربط الحفظ بالخادم.');
        }
    };
    
    document.getElementById('loadQuestionsBtn').addEventListener('click', () => {
        loadQuestions();
    });
    
    document.getElementById('addNewBtn').addEventListener('click', () => {
        editingIndex = null;
        document.getElementById('editMode').value = 'false';
        document.getElementById('questionForm').reset();
        graphPoints = [{x:0,y:0}, {x:2,y:4}];
        renderPointsTable();
        renderGraph();
        document.getElementById('editPanel').style.display = 'block';
    });
    
    document.getElementById('cancelEdit').addEventListener('click', () => {
        document.getElementById('editPanel').style.display = 'none';
    });
    
    document.getElementById('questionForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const newQuestion = {
            id: (editingIndex !== null && currentQuestions[editingIndex]) ? currentQuestions[editingIndex].id : Date.now(),
            text: document.getElementById('qText').value,
            options: [
                document.getElementById('optA').value,
                document.getElementById('optB').value,
                document.getElementById('optC').value,
                document.getElementById('optD').value
            ],
            correct: document.getElementById('correct').value,
            difficulty: document.getElementById('difficulty').value,
            explanation: document.getElementById('explanation').value,
            graph: JSON.parse(document.getElementById('graphData').value || '{"points":[]}')
        };
        if (editingIndex !== null) {
            currentQuestions[editingIndex] = newQuestion;
            alert('تم تعديل السؤال مؤقتاً. لحفظ التغييرات نهائياً، يجب ربط الحفظ بالخادم.');
        } else {
            currentQuestions.push(newQuestion);
            alert('تم إضافة السؤال مؤقتاً.');
        }
        displayQuestions();
        document.getElementById('editPanel').style.display = 'none';
    });
    
    // ------------------- أمان المالك -------------------
    const session = localStorage.getItem('current_user_session');
    if (!session) window.location.href = 'index.html';
    const user = JSON.parse(session);
    if (user.role !== 'admin') window.location.href = 'index.html';
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('current_user_session');
        window.location.href = 'index.html';
    });
    
    // تهيئة أولية (لا تحمل الأسئلة تلقائياً حتى لا يحدث خطأ)
    renderPointsTable();
    renderGraph();
</script>
</body>
</html>
