<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>لوحة المالك المتطورة | عبدالخالق فيزياء</title>
    <!-- Chart.js للرسوم البيانية -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- html2canvas لتصدير الرسوم -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Tajawal', system-ui, sans-serif;
            background: radial-gradient(circle at 10% 20%, #2c1a12, #0f0906);
            min-height: 100vh;
            padding: 25px;
            color: #f5e6d3;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* الهيدر */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        h1 { font-size: 2rem; background: linear-gradient(135deg, #f3e0be, #d4a55a); background-clip: text; -webkit-background-clip: text; color: transparent; letter-spacing: -1px; }
        .logout-btn { background: #5e3a1f; padding: 10px 25px; border-radius: 40px; border: none; color: #f5e6d3; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .logout-btn:hover { background: #7a4a1f; transform: scale(0.98); }
        
        /* التبويبات */
        .tabs { display: flex; gap: 12px; margin-bottom: 30px; border-bottom: 2px solid #8b5a2b; flex-wrap: wrap; }
        .tab-btn {
            background: none; border: none; color: #c9ac82; padding: 12px 28px; font-size: 1rem; font-weight: bold;
            cursor: pointer; border-radius: 40px 40px 0 0; transition: 0.2s;
        }
        .tab-btn.active { background: #8b5a2b; color: white; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); }
        .tab-pane { display: none; animation: fade 0.3s ease; }
        .tab-pane.active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        
        /* البطاقات والأقسام */
        .section {
            background: rgba(47, 31, 22, 0.85); backdrop-filter: blur(12px);
            border-radius: 48px; padding: 28px; margin-bottom: 30px;
            border: 1px solid rgba(199, 164, 107, 0.5); box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .section-title {
            font-size: 1.5rem; margin-bottom: 25px; border-right: 5px solid #e9b85c;
            padding-right: 20px; display: flex; align-items: center; gap: 10px;
        }
        
        /* شريط التصفية */
        .filter-bar {
            display: flex; gap: 15px; flex-wrap: wrap; align-items: center;
            background: #1f130e; padding: 15px 25px; border-radius: 60px; margin-bottom: 25px;
        }
        .filter-bar select, .filter-bar button {
            padding: 10px 20px; border-radius: 40px; background: #2c1a12;
            border: 1px solid #d9a13b; color: #faeedb; font-family: inherit;
        }
        .btn { background: linear-gradient(95deg, #7a4a1f, #a16f3a); border: none; padding: 10px 24px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-sm { padding: 6px 16px; font-size: 0.75rem; }
        .btn-danger { background: linear-gradient(95deg, #8b2a2a, #b14444); }
        
        /* الجدول */
        .table-wrapper { overflow-x: auto; border-radius: 28px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 10px; text-align: right; border-bottom: 1px solid #8b5a2b; vertical-align: middle; }
        th { color: #e9c48b; font-size: 0.9rem; }
        
        /* نموذج التعديل */
        .edit-panel {
            display: none; margin-top: 30px; padding: 25px; background: #1e1510;
            border-radius: 48px; border: 2px solid #d9a13b; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        .full-width { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: bold; color: #ecd9b4; font-size: 0.85rem; }
        input, select, textarea {
            background: #23150e; border: 1.5px solid #8b5a2b; border-radius: 28px;
            padding: 12px 18px; color: #faeedb; font-family: inherit; width: 100%;
        }
        textarea { resize: vertical; min-height: 80px; }
        
        /* منطقة الرسم */
        .canvas-card {
            background: #0f0906; border-radius: 32px; padding: 20px; margin: 20px 0;
            border: 1px solid #c7a46b;
        }
        .canvas-container { text-align: center; margin-bottom: 15px; }
        canvas { background: white; border-radius: 24px; box-shadow: 0 8px 20px black; cursor: crosshair; max-width: 100%; height: auto; }
        .draw-tools, .color-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 15px 0; align-items: center; }
        .slider-label { display: flex; align-items: center; gap: 10px; background: #2c1a12; padding: 5px 15px; border-radius: 40px; }
        
        footer { text-align: center; margin-top: 40px; color: #8b6a48; }
        @media (max-width: 800px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🛡️ لوحة المالك – إدارة الأسئلة المتقدمة</h1>
        <button id="logoutBtn" class="logout-btn">🚪 خروج آمن</button>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" data-tab="manage">📋 إدارة الأسئلة</button>
        <button class="tab-btn" data-tab="users">👥 المستخدمين</button>
        <button class="tab-btn" data-tab="settings">⚙️ الإعدادات والنسخ</button>
    </div>
    
    <!-- تبويب إدارة الأسئلة -->
    <div id="tab-manage" class="tab-pane active">
        <div class="section">
            <div class="section-title">🔍 تصفية الأسئلة</div>
            <div class="filter-bar">
                <select id="filterType">
                    <option value="standard">📚 حسب المعيار</option>
                    <option value="subject">📖 حسب المادة</option>
                    <option value="difficulty">⭐ حسب الصعوبة</option>
                </select>
                <select id="filterStandard"><option value="">اختر المعيار</option></select>
                <select id="filterSubject" style="display:none;"><option value="">اختر المادة</option><option value="mechanics">الميكانيكا</option><option value="electricity">الكهرباء والمغناطيس</option><option value="heat_waves">الحرارة والموجات</option><option value="modern">الفيزياء الحديثة</option></select>
                <select id="filterDifficulty" style="display:none;"><option value="">اختر الصعوبة</option><option value="easy">سهل</option><option value="medium">متوسط</option><option value="hard">صعب</option><option value="very_hard">صعب جداً</option></select>
                <button id="applyFilter" class="btn">🔍 عرض الأسئلة</button>
                <button id="addNewBtn" class="btn" style="background:#d4a55a; color:#1f110a;">✨ إضافة سؤال جديد</button>
            </div>
            <div id="questionsTableContainer" class="table-wrapper"></div>
        </div>
        
        <!-- لوحة التعديل والإضافة المتطورة -->
        <div id="editPanel" class="edit-panel">
            <div class="section-title" id="editPanelTitle">✏️ تحرير السؤال</div>
            <form id="questionForm">
                <input type="hidden" id="editMode" value="false">
                <input type="hidden" id="editQuestionId" value="">
                <input type="hidden" id="editOldStandard" value="">
                <input type="hidden" id="editOldSubject" value="">
                <input type="hidden" id="editOldDifficulty" value="">
                
                <div class="form-grid">
                    <div class="form-group full-width"><label>📝 نص السؤال</label><textarea id="qText" rows="3" required></textarea></div>
                    <div class="form-group"><label>أ) الخيار الأول</label><input type="text" id="optA" required></div>
                    <div class="form-group"><label>ب) الخيار الثاني</label><input type="text" id="optB" required></div>
                    <div class="form-group"><label>ج) الخيار الثالث</label><input type="text" id="optC" required></div>
                    <div class="form-group"><label>د) الخيار الرابع</label><input type="text" id="optD" required></div>
                    <div class="form-group"><label>✅ الإجابة الصحيحة</label><select id="correct"><option value="أ">أ</option><option value="ب">ب</option><option value="ج">ج</option><option value="د">د</option></select></div>
                    <div class="form-group"><label>📚 المعيار (1-18)</label><input type="number" id="standard" min="1" max="18" required></div>
                    <div class="form-group"><label>📖 المادة</label><select id="subject"><option value="mechanics">الميكانيكا</option><option value="electricity">الكهرباء والمغناطيس</option><option value="heat_waves">الحرارة والموجات</option><option value="modern">الفيزياء الحديثة</option></select></div>
                    <div class="form-group"><label>⭐ مستوى الصعوبة</label><select id="difficulty"><option value="easy">سهل</option><option value="medium">متوسط</option><option value="hard">صعب</option><option value="very_hard">صعب جداً</option></select></div>
                    <div class="form-group full-width"><label>💡 شرح الإجابة (سيظهر للطالبة)</label><textarea id="explanation" rows="2" placeholder="لماذا هذه الإجابة صحيحة؟"></textarea></div>
                </div>
                
                <!-- الرسم البياني المتطور -->
                <div class="canvas-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                        <span>📈 الرسم البياني (يدوي أو نقاط)</span>
                        <div class="slider-label">✏️ حجم القلم: <input type="range" id="penSize" min="1" max="20" value="3" style="width:100px"></div>
                    </div>
                    <div class="canvas-container">
                        <canvas id="graphCanvas" width="550" height="280" style="width:100%; height:auto; max-width:550px; background:white; border-radius:20px;"></canvas>
                    </div>
                    <div class="draw-tools">
                        <button type="button" id="clearCanvas" class="btn-sm">🗑️ مسح الكل</button>
                        <button type="button" id="undoDraw" class="btn-sm">↩️ تراجع</button>
                        <button type="button" id="saveDrawing" class="btn-sm">💾 حفظ كصورة</button>
                        <button type="button" id="uploadBtn" class="btn-sm">📁 رفع صورة</button>
                        <input type="file" id="uploadImage" accept="image/*" style="display:none">
                        <button type="button" id="exportGraph" class="btn-sm">📤 تصدير الرسم PNG</button>
                    </div>
                    <div class="color-row">
                        <span>🎨 ألوان الرسم: </span>
                        <label>الخط: <input type="color" id="lineColor" value="#d9a13b"></label>
                        <label>النقاط: <input type="color" id="pointColor" value="#c7a46b"></label>
                        <label>التعبئة: <input type="color" id="fillColor" value="#f5e6d3"></label>
                    </div>
                    <div id="graphPointsEditor"></div>
                    <input type="hidden" id="graphData">
                </div>
                
                <div style="display: flex; gap: 18px; justify-content: flex-end; margin-top: 25px;">
                    <button type="submit" class="btn">💾 حفظ السؤال</button>
                    <button type="button" id="cancelEdit" class="btn" style="background:#5e3a1f;">❌ إلغاء</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- تبويب المستخدمين (سريع) -->
    <div id="tab-users" class="tab-pane">
        <div class="section"><div class="section-title">👥 إدارة المستخدمين</div><div id="usersList">قريباً سيتم ربطها مع نظام الحماية.</div></div>
    </div>
    
    <!-- تبويب الإعدادات -->
    <div id="tab-settings" class="tab-pane">
        <div class="section">
            <div class="section-title">⚙️ النسخ الاحتياطي والاستعادة</div>
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <button id="exportAllData" class="btn">📥 تصدير جميع الأسئلة (JSON)</button>
                <button id="importDataBtn" class="btn">📂 استيراد ملف JSON</button>
                <input type="file" id="importFile" accept=".json" style="display:none">
            </div>
            <hr style="margin: 20px 0; border-color:#8b5a2b;">
            <div class="form-group"><label>رابط التخزين السحابي (Gist)</label><input type="text" id="gistUrl" placeholder="https://gist.github.com/..."></div>
            <button id="saveSettings" class="btn">💾 حفظ الإعدادات</button>
        </div>
    </div>
    
    <footer>✨ نظام متطور لإدارة الأسئلة والرسوم البيانية – عبدالخالق فيزياء ✨</footer>
</div>

<script>
    // ------------------- قاعدة البيانات المركزية -------------------
    let questionsDB = {
        standards: {},   // مثلاً standards[4] = { standardId:4, questions: { easy:[], medium:[], hard:[], very_hard:[] } }
        subjects: {}
    };
    
    // ------------------- الرسم المتقدم -------------------
    let graphPoints = [{x:0, y:0}, {x:2, y:4}];
    let drawingHistory = [];
    let graphChart = null;
    let isDrawing = false;
    let lastX, lastY;
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() { canvas.width = 550; canvas.height = 280; clearCanvasFull(); renderPointsTable(); renderGraphPreview(); }
    function clearCanvasFull() { ctx.fillStyle = 'white'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#000'; }
    function saveCanvasState() { drawingHistory.push(canvas.toDataURL()); if(drawingHistory.length > 30) drawingHistory.shift(); }
    function restoreCanvasState() { if(drawingHistory.length) { let img = new Image(); img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); }; img.src = drawingHistory.pop(); } }
    
    function startDraw(e) { isDrawing = true; let pos = getCoords(e); lastX = pos.x; lastY = pos.y; ctx.beginPath(); ctx.moveTo(lastX, lastY); saveCanvasState(); }
    function drawMove(e) { if(!isDrawing) return; let pos = getCoords(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); lastX = pos.x; lastY = pos.y; }
    function endDraw() { isDrawing = false; }
    function getCoords(e) {
        let rect = canvas.getBoundingClientRect();
        let scaleX = canvas.width / rect.width;
        let scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if(e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
        else { clientX = e.clientX; clientY = e.clientY; }
        let x = (clientX - rect.left) * scaleX;
        let y = (clientY - rect.top) * scaleY;
        x = Math.min(Math.max(0, x), canvas.width);
        y = Math.min(Math.max(0, y), canvas.height);
        return { x, y };
    }
    canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', drawMove); canvas.addEventListener('mouseup', endDraw); canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e.touches[0]); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); drawMove(e.touches[0]); });
    canvas.addEventListener('touchend', endDraw);
    document.getElementById('penSize').addEventListener('input', (e) => { ctx.lineWidth = e.target.value; });
    document.getElementById('clearCanvas').addEventListener('click', () => { clearCanvasFull(); graphPoints = []; renderPointsTable(); renderGraphPreview(); });
    document.getElementById('undoDraw').addEventListener('click', restoreCanvasState);
    document.getElementById('saveDrawing').addEventListener('click', () => { localStorage.setItem('tempDrawing', canvas.toDataURL()); alert('تم حفظ الرسم في المتصفح مؤقتاً'); });
    document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('uploadImage').click());
    document.getElementById('uploadImage').addEventListener('change', (e) => {
        let file = e.target.files[0];
        let reader = new FileReader();
        reader.onload = (ev) => { let img = new Image(); img.onload = () => { ctx.drawImage(img, 0, 0, canvas.width, canvas.height); }; img.src = ev.target.result; };
        reader.readAsDataURL(file);
    });
    document.getElementById('exportGraph').addEventListener('click', () => { html2canvas(canvas).then(c => { let link = document.createElement('a'); link.download = 'graph.png'; link.href = c.toDataURL(); link.click(); }); });
    
    function renderGraphPreview() {
        if(graphChart) graphChart.destroy();
        graphChart = new Chart(canvas.getContext('2d'), {
            type: 'line',
            data: { datasets: [{ data: graphPoints, borderColor: document.getElementById('lineColor').value, backgroundColor: document.getElementById('fillColor').value, borderWidth: 3, pointRadius: 5, pointBackgroundColor: document.getElementById('pointColor').value, tension: 0, fill: true }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { x: { title: { display: true, text: 'المحور X' } }, y: { title: { display: true, text: 'المحور Y' } } } }
        });
        document.getElementById('graphData').value = JSON.stringify({ points: graphPoints, lineColor: document.getElementById('lineColor').value, pointColor: document.getElementById('pointColor').value, fillColor: document.getElementById('fillColor').value });
    }
    function renderPointsTable() {
        let html = '<table class="table-wrapper" style="margin-top:15px;"><thead><th>#</th><th>X</th><th>Y</th><th></th></thead><tbody>';
        graphPoints.forEach((p,i) => { html += `<tr><td>${i+1}</td><td><input type="number" step="any" value="${p.x}" class="px-${i}" style="width:80px"></td><td><input type="number" step="any" value="${p.y}" class="py-${i}" style="width:80px"></td><td><button class="btn-sm" onclick="removePoint(${i})">🗑️</button></td></tr>`; });
        html += `<tr><td colspan="4"><button id="addPointBtn" class="btn-sm">➕ إضافة نقطة</button></td></tr></tbody></table>`;
        document.getElementById('graphPointsEditor').innerHTML = html;
        for(let i=0; i<graphPoints.length; i++) {
            document.querySelector(`.px-${i}`)?.addEventListener('change', (e) => { graphPoints[i].x = parseFloat(e.target.value); renderGraphPreview(); });
            document.querySelector(`.py-${i}`)?.addEventListener('change', (e) => { graphPoints[i].y = parseFloat(e.target.value); renderGraphPreview(); });
        }
        document.getElementById('addPointBtn')?.addEventListener('click', () => { graphPoints.push({x:0,y:0}); renderPointsTable(); renderGraphPreview(); });
    }
    window.removePoint = (idx) => { if(graphPoints.length>1) { graphPoints.splice(idx,1); renderPointsTable(); renderGraphPreview(); } else alert('لابد من نقطة واحدة على الأقل'); };
    
    // ------------------- تحميل خيارات المعايير -------------------
    function loadStandardOptions() {
        let sel = document.getElementById('filterStandard');
        sel.innerHTML = '<option value="">اختر المعيار</option>';
        for(let i=1;i<=18;i++) sel.innerHTML += `<option value="${i}">المعيار ${i}</option>`;
    }
    document.getElementById('filterType').addEventListener('change', function() {
        document.getElementById('filterStandard').style.display = (this.value === 'standard') ? 'inline-block' : 'none';
        document.getElementById('filterSubject').style.display = (this.value === 'subject') ? 'inline-block' : 'none';
        document.getElementById('filterDifficulty').style.display = (this.value === 'difficulty') ? 'inline-block' : 'none';
    });
    
    // عرض الأسئلة في جدول
    function renderQuestionsTable(questions) {
        if(!questions.length) { document.getElementById('questionsTableContainer').innerHTML = '<div class="section">⚠️ لا توجد أسئلة تطابق المعايير المختارة.</div>'; return; }
        let html = `<table><thead><th>ID</th><th>نص السؤال</th><th>المعيار/المادة</th><th>الصعوبة</th><th>العمليات</th></thead><tbody>`;
        questions.forEach(q => {
            html += `<tr><td>${q.id}</td><td>${q.text.substring(0,60)}...</td><td>${q.standard ? 'معيار '+q.standard : q.subject}</td><td>${q.difficulty}</td>
            <td><button class="btn-sm" onclick='editThisQuestion(${JSON.stringify(q).replace(/\\/g, '\\\\')})'>✏️ تعديل</button>
            <button class="btn-sm btn-danger" onclick='deleteQuestionById(${q.id})'>🗑️ حذف</button></td></tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('questionsTableContainer').innerHTML = html;
    }
    
    document.getElementById('applyFilter').addEventListener('click', () => {
        let type = document.getElementById('filterType').value;
        let filtered = [];
        if(type === 'standard') {
            let std = document.getElementById('filterStandard').value;
            if(!std) { alert('اختر معياراً'); return; }
            let stdData = questionsDB.standards[std];
            if(stdData) for(let diff of ['easy','medium','hard','very_hard']) (stdData.questions[diff]||[]).forEach(q => filtered.push({...q, standard: std, difficulty: diff}));
        }
        else if(type === 'subject') {
            let sub = document.getElementById('filterSubject').value;
            if(!sub) { alert('اختر مادة'); return; }
            let subData = questionsDB.subjects[sub];
            if(subData) for(let diff of ['easy','medium','hard','very_hard']) (subData.questions[diff]||[]).forEach(q => filtered.push({...q, subject: sub, difficulty: diff}));
        }
        else if(type === 'difficulty') {
            let diff = document.getElementById('filterDifficulty').value;
            if(!diff) { alert('اختر مستوى صعوبة'); return; }
            for(let std in questionsDB.standards) (questionsDB.standards[std].questions[diff]||[]).forEach(q => filtered.push({...q, standard: std, difficulty: diff}));
        }
        renderQuestionsTable(filtered);
    });
    
    // وظائف التعديل والحذف
    window.editThisQuestion = function(q) {
        document.getElementById('editPanel').style.display = 'block';
        document.getElementById('editMode').value = 'true';
        document.getElementById('editQuestionId').value = q.id;
        document.getElementById('editOldStandard').value = q.standard || '';
        document.getElementById('editOldSubject').value = q.subject || '';
        document.getElementById('editOldDifficulty').value = q.difficulty;
        document.getElementById('qText').value = q.text;
        document.getElementById('optA').value = q.options[0]; document.getElementById('optB').value = q.options[1];
        document.getElementById('optC').value = q.options[2]; document.getElementById('optD').value = q.options[3];
        document.getElementById('correct').value = q.correct;
        document.getElementById('standard').value = q.standard || 4;
        document.getElementById('subject').value = q.subject || 'mechanics';
        document.getElementById('difficulty').value = q.difficulty;
        document.getElementById('explanation').value = q.explanation || '';
        if(q.graph && q.graph.points) { graphPoints = q.graph.points; document.getElementById('lineColor').value = q.graph.lineColor || '#d9a13b'; document.getElementById('pointColor').value = q.graph.pointColor || '#c7a46b'; document.getElementById('fillColor').value = q.graph.fillColor || '#f5e6d3'; renderPointsTable(); renderGraphPreview(); }
        else { graphPoints = [{x:0,y:0},{x:2,y:4}]; renderPointsTable(); renderGraphPreview(); }
        document.getElementById('editPanel').scrollIntoView({ behavior: 'smooth' });
    };
    window.deleteQuestionById = (id) => {
        if(confirm('حذف السؤال نهائياً؟')) {
            let found = false;
            for(let std in questionsDB.standards) for(let diff of ['easy','medium','hard','very_hard']) { let arr = questionsDB.standards[std].questions[diff]; let idx = arr.findIndex(q=>q.id==id); if(idx!=-1) { arr.splice(idx,1); found=true; break; } if(found) break; }
            if(found) { alert('تم الحذف'); document.getElementById('applyFilter').click(); }
            else alert('لم يتم العثور على السؤال');
        }
    };
    
    document.getElementById('addNewBtn').addEventListener('click', () => {
        document.getElementById('editMode').value = 'false';
        document.getElementById('questionForm').reset();
        graphPoints = [{x:0,y:0},{x:2,y:4}]; renderPointsTable(); renderGraphPreview();
        document.getElementById('editPanel').style.display = 'block';
    });
    document.getElementById('cancelEdit').addEventListener('click', () => { document.getElementById('editPanel').style.display = 'none'; });
    
    // حفظ السؤال
    document.getElementById('questionForm').addEventListener('submit', (e) => {
        e.preventDefault();
        let newId = document.getElementById('editMode').value === 'true' ? parseInt(document.getElementById('editQuestionId').value) : Date.now();
        let newQ = {
            id: newId, text: document.getElementById('qText').value,
            options: [document.getElementById('optA').value, document.getElementById('optB').value, document.getElementById('optC').value, document.getElementById('optD').value],
            correct: document.getElementById('correct').value, subject: document.getElementById('subject').value,
            difficulty: document.getElementById('difficulty').value, explanation: document.getElementById('explanation').value,
            graph: JSON.parse(document.getElementById('graphData').value || '{}'), createdAt: new Date().toISOString()
        };
        let standard = parseInt(document.getElementById('standard').value);
        let subject = document.getElementById('subject').value;
        let difficulty = document.getElementById('difficulty').value;
        
        if(document.getElementById('editMode').value === 'true') {
            let oldStd = document.getElementById('editOldStandard').value;
            let oldSub = document.getElementById('editOldSubject').value;
            let oldDiff = document.getElementById('editOldDifficulty').value;
            if(oldStd && questionsDB.standards[oldStd]?.questions[oldDiff]) { let idx = questionsDB.standards[oldStd].questions[oldDiff].findIndex(q=>q.id==newId); if(idx!=-1) questionsDB.standards[oldStd].questions[oldDiff].splice(idx,1); }
            if(oldSub && questionsDB.subjects[oldSub]?.questions[oldDiff]) { let idx = questionsDB.subjects[oldSub].questions[oldDiff].findIndex(q=>q.id==newId); if(idx!=-1) questionsDB.subjects[oldSub].questions[oldDiff].splice(idx,1); }
        }
        if(!questionsDB.standards[standard]) questionsDB.standards[standard] = { standardId: standard, questions: { easy:[], medium:[], hard:[], very_hard:[] } };
        questionsDB.standards[standard].questions[difficulty].push(newQ);
        if(!questionsDB.subjects[subject]) questionsDB.subjects[subject] = { subjectId: subject, questions: { easy:[], medium:[], hard:[], very_hard:[] } };
        questionsDB.subjects[subject].questions[difficulty].push(newQ);
        
        alert('تم حفظ السؤال بنجاح');
        document.getElementById('editPanel').style.display = 'none';
        document.getElementById('applyFilter').click();
    });
    
    // تصدير واستيراد البيانات
    document.getElementById('exportAllData').addEventListener('click', () => {
        let dataStr = JSON.stringify(questionsDB, null, 2);
        let blob = new Blob([dataStr], {type:'application/json'});
        let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup_questions.json'; a.click();
    });
    document.getElementById('importDataBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change', (e) => {
        let file = e.target.files[0];
        let reader = new FileReader();
        reader.onload = (ev) => { try { let imported = JSON.parse(ev.target.result); if(imported.standards) questionsDB = imported; alert('تم الاستيراد بنجاح'); document.getElementById('applyFilter').click(); } catch(e) { alert('ملف غير صالح'); } };
        reader.readAsText(file);
    });
    
    // التحضير النهائي
    function initDemoData() {
        if(Object.keys(questionsDB.standards).length===0) {
            let sample = { id:101, text:"الرسم البياني يمثل علاقة الموقع-الزمن. أحسب الميل.", options:["أ)1 m/s","ب)2 m/s","ج)0.4 m/s","د)2.4 m/s"], correct:"ب", subject:"mechanics", difficulty:"easy", explanation:"الميل = (4-0)/(2-0)=2", graph:{ points:[{x:0,y:0},{x:2,y:4}], lineColor:"#d9a13b", pointColor:"#c7a46b", fillColor:"#f5e6d3" }, createdAt:new Date().toISOString() };
            questionsDB.standards[4] = { standardId:4, questions:{ easy:[sample], medium:[], hard:[], very_hard:[] } };
            questionsDB.subjects['mechanics'] = { subjectId:'mechanics', questions:{ easy:[sample], medium:[], hard:[], very_hard:[] } };
        }
    }
    
    // أمان وتوجيه المالك
    let session = localStorage.getItem('current_user_session');
    if(!session) window.location.href = 'index.html';
    let usr = JSON.parse(session);
    if(usr.role !== 'admin') window.location.href = 'index.html';
    
    loadStandardOptions();
    initDemoData();
    resizeCanvas();
    ctx.lineWidth = 3;
    document.getElementById('filterType').dispatchEvent(new Event('change'));
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', function() { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active'); document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active')); document.getElementById(`tab-${this.dataset.tab}`).classList.add('active'); }));
    document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.removeItem('current_user_session'); window.location.href = 'index.html'; });
    document.getElementById('saveSettings').addEventListener('click', () => alert('سيتم ربط التخزين السحابي قريباً'));
</script>
</body>
</html>
