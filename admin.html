<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المالك | عبدالخالق فيزياء</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #2c1a12, #1f110a);
            min-height: 100vh;
            padding: 20px;
            color: #f5e6d3;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 { font-size: 1.8rem; background: linear-gradient(135deg, #ecd9b4, #c7a46b); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .logout-btn { background: #5e3a1f; padding: 8px 20px; border-radius: 40px; color: #f5e6d3; text-decoration: none; border: none; cursor: pointer; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #2f1f16b3;
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            border: 1px solid #c7a46b40;
        }
        .stat-number { font-size: 2rem; font-weight: bold; color: #e9c48b; }
        .stat-label { font-size: 0.8rem; color: #c9ac82; margin-top: 8px; }
        
        .section {
            background: #2f1f16b3;
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #c7a46b40;
        }
        .section-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            border-right: 4px solid #d9a13b;
            padding-right: 15px;
        }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: #ecd9b4; font-weight: 500; }
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            background: #23150e;
            border: 1.5px solid #8b5a2b;
            border-radius: 16px;
            color: #faeedb;
            font-family: inherit;
        }
        textarea { resize: vertical; min-height: 80px; }
        .options-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .btn {
            background: linear-gradient(95deg, #7a4a1f, #9b6737);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-danger { background: linear-gradient(95deg, #8b2a2a, #b14444); }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; margin: 2px; }
        
        .canvas-area {
            background: #1e1510;
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }
        canvas {
            border: 2px solid #8b5a2b;
            border-radius: 12px;
            background: white;
            cursor: crosshair;
            width: 100%;
            max-width: 500px;
            height: auto;
            background-image: radial-gradient(circle, #ccc 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .draw-tools { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.85rem;
        }
        th, td {
            padding: 10px 6px;
            text-align: right;
            border-bottom: 1px solid #8b5a2b;
        }
        th { color: #e9c48b; }
        .status-active { color: #6fcf97; }
        .status-banned { color: #e74c3c; }
        
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 1px solid #8b5a2b;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #c9ac82;
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 30px;
        }
        .tab-btn.active {
            background: #8b5a2b;
            color: white;
        }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        
        .difficulty-buttons {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .difficulty-btn {
            background: #3d2a1f;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #8b5a2b;
        }
        .difficulty-btn.selected {
            background: #d9a13b;
            color: #1f110a;
            font-weight: bold;
        }
        
        footer { text-align: center; margin-top: 30px; color: #6f4f31; font-size: 0.7rem; }
        @media (max-width: 700px) {
            .options-row { grid-template-columns: 1fr; }
            th, td { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🛡️ لوحة المالك – عبدالخالق فيزياء</h1>
        <button id="logoutBtn" class="logout-btn">🚪 تسجيل خروج</button>
    </div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-number" id="totalQuestions">0</div><div class="stat-label">📝 إجمالي الأسئلة</div></div>
        <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div class="stat-label">👩‍🎓 المستخدمين</div></div>
        <div class="stat-card"><div class="stat-number" id="totalTests">0</div><div class="stat-label">📊 إجمالي الاختبارات</div></div>
        <div class="stat-card"><div class="stat-number" id="avgScore">0%</div><div class="stat-label">⭐ متوسط التقييم</div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="questions">📝 إدارة الأسئلة</button>
        <button class="tab-btn" data-tab="users">👥 إدارة المستخدمين</button>
        <button class="tab-btn" data-tab="settings">⚙️ الإعدادات</button>
    </div>

    <!-- قسم إدارة الأسئلة -->
    <div class="tab-pane active" id="tab-questions">
        <div class="section">
            <div class="section-title">➕ إضافة سؤال جديد</div>
            <form id="addQuestionForm">
                <div class="form-group">
                    <label>📝 نص السؤال</label>
                    <textarea id="qText" required placeholder="اكتب نص السؤال هنا..."></textarea>
                </div>
                <div class="options-row">
                    <div class="form-group"><label>أ) الخيار الأول</label><input type="text" id="optA" required></div>
                    <div class="form-group"><label>ب) الخيار الثاني</label><input type="text" id="optB" required></div>
                    <div class="form-group"><label>ج) الخيار الثالث</label><input type="text" id="optC" required></div>
                    <div class="form-group"><label>د) الخيار الرابع</label><input type="text" id="optD" required></div>
                </div>
                <div class="options-row">
                    <div class="form-group"><label>✅ الإجابة الصحيحة</label>
                        <select id="correct"><option value="أ">أ</option><option value="ب">ب</option><option value="ج">ج</option><option value="د">د</option></select>
                    </div>
                    <div class="form-group"><label>📚 المعيار (1-18)</label>
                        <select id="standard" onchange="updateFieldByStandard()">
                            <option value="1">1 - طبيعة العلم</option><option value="2">2 - المنهج العلمي</option>
                            <option value="3">3 - المختبرات والسلامة</option><option value="4">4 - المهارات الرياضية</option>
                            <option value="5">5 - الميكانيكا</option><option value="6">6 - الموائع</option>
                            <option value="7">7 - خواص المادة</option><option value="8">8 - الكهرباء (قوة ومجال)</option>
                            <option value="9">9 - التيار والدوائر</option><option value="10">10 - المغناطيسية</option>
                            <option value="11">11 - الحرارة والديناميكا</option><option value="12">12 - الموجات والاهتزازات</option>
                            <option value="13">13 - الضوء</option><option value="14">14 - الفيزياء الحديثة</option>
                            <option value="15">15 - الفيزياء النووية</option>
                            <option value="16">16 - العلاقة بالعلوم الأخرى</option>
                            <option value="17">17 - مهارات التدريس</option>
                            <option value="18">18 - استراتيجيات التدريس والتقويم</option>
                        </select>
                    </div>
                    <div class="form-group"><label>🧪 المادة</label>
                        <select id="subject"><option value="mechanics">الميكانيكا</option><option value="electricity">الكهرباء والمغناطيس</option><option value="heat_waves">الحرارة والموجات والضوء</option><option value="modern">الفيزياء الحديثة والنووية</option></select>
                    </div>
                    <div class="form-group"><label>📅 السنة (للتجميعات)</label>
                        <select id="year"><option value="1444">1444 هـ</option><option value="1445">1445 هـ</option><option value="1446">1446 هـ</option><option value="1447">1447 هـ</option><option value="general">عام</option></select>
                    </div>
                </div>
                <div class="form-group">
                    <label>⭐ مستوى الصعوبة</label>
                    <div class="difficulty-buttons" id="difficultySelector">
                        <div class="difficulty-btn" data-diff="easy">سهل</div>
                        <div class="difficulty-btn" data-diff="medium">متوسط</div>
                        <div class="difficulty-btn" data-diff="hard">صعب</div>
                        <div class="difficulty-btn" data-diff="very_hard">صعب جداً</div>
                    </div>
                    <input type="hidden" id="difficulty" value="easy">
                </div>
                <div class="form-group">
                    <label>💡 شرح الإجابة (يظهر للطالبة بعد الاختبار)</label>
                    <textarea id="explanation" placeholder="سبب صحة الإجابة..."></textarea>
                </div>
                
                <div class="canvas-area">
                    <label>🖌️ الرسم التوضيحي (اختياري)</label>
                    <canvas id="drawCanvas" width="500" height="250" style="width:100%; max-width:500px; height:250px"></canvas>
                    <div class="draw-tools">
                        <button type="button" id="clearCanvas" class="btn-sm">🗑️ مسح</button>
                        <button type="button" id="saveDrawing" class="btn-sm">💾 حفظ الرسم</button>
                        <button type="button" id="uploadBtn" class="btn-sm">📁 رفع صورة</button>
                        <input type="file" id="uploadImage" accept="image/*" style="display:none">
                    </div>
                    <input type="hidden" id="imageData">
                </div>
                
                <button type="submit" class="btn">💾 حفظ السؤال</button>
            </form>
        </div>

        <div class="section">
            <div class="section-title">📋 قائمة الأسئلة</div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                <select id="filterStandard"><option value="">كل المعايير</option></select>
                <select id="filterSubject"><option value="">كل المواد</option></select>
                <select id="filterDifficultyList"><option value="">كل المستويات</option><option value="easy">سهل</option><option value="medium">متوسط</option><option value="hard">صعب</option><option value="very_hard">صعب جداً</option></select>
                <button id="applyFilter" class="btn-sm">🔍 بحث</button>
            </div>
            <div id="questionsList" style="overflow-x: auto;"></div>
        </div>
    </div>

    <!-- قسم إدارة المستخدمين -->
    <div class="tab-pane" id="tab-users">
        <div class="section">
            <div class="section-title">👥 المستخدمون المسجلون</div>
            <div id="usersList"></div>
        </div>
    </div>

    <!-- قسم الإعدادات -->
    <div class="tab-pane" id="tab-settings">
        <div class="section">
            <div class="section-title">⚙️ إعدادات التخزين (GitHub Gist)</div>
            <div class="form-group"><label>🔗 رابط Gist الرئيسي (يحتوي على مجلد البيانات)</label><input type="text" id="gistBaseUrl" placeholder="https://gist.githubusercontent.com/.../raw/"></div>
            <div class="form-group"><label>🔑 GitHub Token (للتعديل)</label><input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx"></div>
            <button id="saveSettings" class="btn">💾 حفظ الإعدادات</button>
            <hr style="margin: 20px 0; border-color: #8b5a2b;">
            <button id="backupData" class="btn">📥 نسخ احتياطي (تصدير)</button>
            <button id="restoreData" class="btn btn-danger">📂 استعادة من نسخة</button>
            <input type="file" id="restoreFile" accept=".json" style="display:none">
        </div>
    </div>

    <footer>أ. عبد الخالق | نظام إدارة الأسئلة والمستخدمين – تخزين مركزي عبر Gist</footer>
</div>

<script>
    // ------------------- إعدادات التخزين -------------------
    let GIST_BASE_URL = localStorage.getItem('gist_base_url') || '';
    let GITHUB_TOKEN = localStorage.getItem('github_token') || '';
    let GIST_ID = '';
    
    // هيكل البيانات في الذاكرة
    let questionsDB = {
        standards: {},   // standard-1.json, standard-2.json ...
        subjects: {}     // mechanics.json, electricity.json ...
    };
    let usersDB = { users: [] };
    let resultsDB = { results: [] };
    
    let selectedDifficulty = 'easy';
    
    // ------------------- دوال التهيئة -------------------
    function extractGistId(url) {
        const match = url.match(/gist\.github\.com\/([^\/]+)\/([a-f0-9]+)/) || 
                      url.match(/gist\.githubusercontent\.com\/[^\/]+\/([a-f0-9]+)/);
        return match ? match[2] : null;
    }
    
    async function loadAllData() {
        if(!GIST_BASE_URL || !GIST_ID) return;
        try {
            // تحميل ملفات المعايير (1-18)
            for(let i=1; i<=18; i++) {
                const res = await fetch(`${GIST_BASE_URL}standard-${i}.json`);
                if(res.ok) questionsDB.standards[i] = await res.json();
                else questionsDB.standards[i] = { standardId: i, questions: { easy:[], medium:[], hard:[], very_hard:[] } };
            }
            // تحميل ملفات المواد
            const subjects = ['mechanics', 'electricity', 'heat_waves', 'modern'];
            for(let s of subjects) {
                const res = await fetch(`${GIST_BASE_URL}${s}.json`);
                if(res.ok) questionsDB.subjects[s] = await res.json();
                else questionsDB.subjects[s] = { subjectId: s, questions: { easy:[], medium:[], hard:[], very_hard:[] } };
            }
            // تحميل المستخدمين والنتائج
            let usersRes = await fetch(`${GIST_BASE_URL}users.json`);
            if(usersRes.ok) usersDB = await usersRes.json();
            let resultsRes = await fetch(`${GIST_BASE_URL}results.json`);
            if(resultsRes.ok) resultsDB = await resultsRes.json();
            
            updateStats();
            renderQuestionsTable();
            renderUsersTable();
            populateFilters();
        } catch(e) { console.error('خطأ في التحميل', e); }
    }
    
    async function saveFileToGist(filename, content) {
        if(!GIST_ID || !GITHUB_TOKEN) return false;
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ files: { [filename]: { content: JSON.stringify(content, null, 2) } } })
            });
            return res.ok;
        } catch(e) { return false; }
    }
    
    async function saveQuestion(questionData, standardId, subjectId, difficulty) {
        // حفظ في ملف المعيار
        if(!questionsDB.standards[standardId]) questionsDB.standards[standardId] = { standardId, questions: { easy:[], medium:[], hard:[], very_hard:[] } };
        questionsDB.standards[standardId].questions[difficulty].push(questionData);
        await saveFileToGist(`standard-${standardId}.json`, questionsDB.standards[standardId]);
        
        // حفظ في ملف المادة
        if(!questionsDB.subjects[subjectId]) questionsDB.subjects[subjectId] = { subjectId, questions: { easy:[], medium:[], hard:[], very_hard:[] } };
        questionsDB.subjects[subjectId].questions[difficulty].push(questionData);
        await saveFileToGist(`${subjectId}.json`, questionsDB.subjects[subjectId]);
        
        return true;
    }
    
    // ------------------- الإحصائيات -------------------
    function updateStats() {
        let totalQ = 0;
        for(let i=1; i<=18; i++) {
            if(questionsDB.standards[i]) {
                totalQ += questionsDB.standards[i].questions.easy.length;
                totalQ += questionsDB.standards[i].questions.medium.length;
                totalQ += questionsDB.standards[i].questions.hard.length;
                totalQ += questionsDB.standards[i].questions.very_hard.length;
            }
        }
        document.getElementById('totalQuestions').innerText = totalQ;
        document.getElementById('totalUsers').innerText = usersDB.users?.length || 0;
        let totalTests = resultsDB.results?.length || 0;
        let avg = 0;
        if(totalTests > 0) {
            let sum = resultsDB.results.reduce((a,b) => a + ((b.score/b.total)*100), 0);
            avg = Math.round(sum / totalTests);
        }
        document.getElementById('totalTests').innerText = totalTests;
        document.getElementById('avgScore').innerText = avg + '%';
    }
    
    // ------------------- عرض الجداول -------------------
    function renderQuestionsTable() {
        let stdFilter = document.getElementById('filterStandard').value;
        let subFilter = document.getElementById('filterSubject').value;
        let diffFilter = document.getElementById('filterDifficultyList').value;
        let allQuestions = [];
        for(let i=1; i<=18; i++) {
            if(stdFilter && i != stdFilter) continue;
            let std = questionsDB.standards[i];
            if(!std) continue;
            for(let diff of ['easy','medium','hard','very_hard']) {
                if(diffFilter && diffFilter !== diff) continue;
                for(let q of std.questions[diff]) {
                    allQuestions.push({...q, standard: i, difficulty: diff});
                }
            }
        }
        let html = `<table><thead><tr><th>ID</th><th>نص السؤال</th><th>المعيار</th><th>المادة</th><th>الصعوبة</th><th>الإجراءات</th></tr></thead><tbody>`;
        allQuestions.forEach((q, idx) => {
            html += `<tr>
                <td>${q.id || idx+1}</td>
                <td>${(q.text || '').substring(0, 50)}...</td>
                <td>${q.standard}</td>
                <td>${q.subject || '-'}</td>
                <td>${q.difficulty}</td>
                <td><button class="btn-sm" onclick="alert('سيتم تفعيل التعديل لاحقاً')">✏️</button> <button class="btn-sm btn-danger" onclick="alert('سيتم تفعيل الحذف لاحقاً')">🗑️</button></td>
             </tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('questionsList').innerHTML = html;
    }
    
    function renderUsersTable() {
        let users = usersDB.users || [];
        let html = `<table><thead><tr><th>البريد</th><th>الاسم</th><th>تاريخ التسجيل</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody>`;
        users.forEach((u, idx) => {
            html += `<tr>
                <td>${u.email}</td>
                <td>${u.name || '-'}</td>
                <td>${u.registeredAt ? new Date(u.registeredAt).toLocaleDateString() : '-'}</td>
                <td class="${u.status === 'banned' ? 'status-banned' : 'status-active'}">${u.status === 'banned' ? 'محظور' : 'نشط'}</td>
                <td><button class="btn-sm" onclick="toggleUserStatus(${idx})">${u.status === 'banned' ? 'إلغاء الحظر' : 'حظر'}</button> <button class="btn-sm btn-danger" onclick="deleteUser(${idx})">حذف</button></td>
             </tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('usersList').innerHTML = html;
    }
    
    function populateFilters() {
        let stdSelect = document.getElementById('filterStandard');
        stdSelect.innerHTML = '<option value="">كل المعايير</option>';
        for(let i=1; i<=18; i++) stdSelect.innerHTML += `<option value="${i}">${i}</option>`;
        let subSelect = document.getElementById('filterSubject');
        subSelect.innerHTML = '<option value="">كل المواد</option><option value="mechanics">الميكانيكا</option><option value="electricity">الكهرباء</option><option value="heat_waves">الحرارة والموجات</option><option value="modern">الفيزياء الحديثة</option>';
    }
    
    // ------------------- دوال المستخدمين -------------------
    window.toggleUserStatus = async function(idx) {
        if(!usersDB.users[idx]) return;
        usersDB.users[idx].status = usersDB.users[idx].status === 'banned' ? 'active' : 'banned';
        await saveFileToGist('users.json', usersDB);
        renderUsersTable();
        updateStats();
    };
    window.deleteUser = async function(idx) {
        if(confirm('هل أنت متأكد من حذف هذا المستخدم؟ سيتم حذف جميع نتائجه أيضاً.')) {
            usersDB.users.splice(idx, 1);
            await saveFileToGist('users.json', usersDB);
            renderUsersTable();
            updateStats();
        }
    };
    
    // ------------------- إعدادات الرسم -------------------
    const canvas = document.getElementById('drawCanvas');
    let ctx = canvas.getContext('2d');
    let drawing = false;
    function initCanvas() { canvas.width = 500; canvas.height = 250; ctx.fillStyle = 'white'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; }
    function startDrawing(e) { drawing = true; const pos = getMousePos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
    function draw(e) { if(!drawing) return; const pos = getMousePos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
    function stopDrawing() { drawing = false; }
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if(e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
        else { clientX = e.clientX; clientY = e.clientY; }
        let x = (clientX - rect.left) * scaleX;
        let y = (clientY - rect.top) * scaleY;
        x = Math.min(Math.max(0, x), canvas.width);
        y = Math.min(Math.max(0, y), canvas.height);
        return { x, y };
    }
    canvas.addEventListener('mousedown', startDrawing); canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing); canvas.addEventListener('mouseleave', stopDrawing);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e.touches[0]); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
    canvas.addEventListener('touchend', stopDrawing);
    document.getElementById('clearCanvas').addEventListener('click', () => { ctx.fillStyle = 'white'; ctx.fillRect(0, 0, canvas.width, canvas.height); document.getElementById('imageData').value = ''; });
    document.getElementById('saveDrawing').addEventListener('click', () => { document.getElementById('imageData').value = canvas.toDataURL(); alert('تم حفظ الرسم'); });
    document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('uploadImage').click());
    document.getElementById('uploadImage').addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => { const img = new Image(); img.onload = () => { ctx.drawImage(img, 0, 0, canvas.width, canvas.height); document.getElementById('imageData').value = canvas.toDataURL(); }; img.src = event.target.result; };
        reader.readAsDataURL(file);
    });
    initCanvas();
    
    // ------------------- اختيار مستوى الصعوبة -------------------
    document.querySelectorAll('.difficulty-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedDifficulty = btn.dataset.diff;
            document.getElementById('difficulty').value = selectedDifficulty;
        });
    });
    document.querySelector('.difficulty-btn').classList.add('selected');
    
    // ------------------- إضافة سؤال -------------------
    document.getElementById('addQuestionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newQuestion = {
            id: Date.now(),
            text: document.getElementById('qText').value,
            options: [document.getElementById('optA').value, document.getElementById('optB').value, document.getElementById('optC').value, document.getElementById('optD').value],
            correct: document.getElementById('correct').value,
            subject: document.getElementById('subject').value,
            year: document.getElementById('year').value,
            difficulty: document.getElementById('difficulty').value,
            explanation: document.getElementById('explanation').value,
            image: document.getElementById('imageData').value || null,
            createdAt: new Date().toISOString()
        };
        const standardId = parseInt(document.getElementById('standard').value);
        const subjectId = document.getElementById('subject').value;
        const difficulty = document.getElementById('difficulty').value;
        
        if(await saveQuestion(newQuestion, standardId, subjectId, difficulty)) {
            alert('تم حفظ السؤال بنجاح');
            document.getElementById('addQuestionForm').reset();
            initCanvas();
            document.getElementById('imageData').value = '';
            loadAllData();
        } else {
            alert('فشل الحفظ. تأكد من إعدادات Gist و Token');
        }
    });
    
    // ------------------- الإعدادات -------------------
    document.getElementById('saveSettings').addEventListener('click', () => {
        GIST_BASE_URL = document.getElementById('gistBaseUrl').value;
        GITHUB_TOKEN = document.getElementById('githubToken').value;
        GIST_ID = extractGistId(GIST_BASE_URL);
        localStorage.setItem('gist_base_url', GIST_BASE_URL);
        localStorage.setItem('github_token', GITHUB_TOKEN);
        alert('تم حفظ الإعدادات');
        loadAllData();
    });
    document.getElementById('applyFilter').addEventListener('click', () => renderQuestionsTable());
    document.getElementById('backupData').addEventListener('click', () => {
        const all = { questions: questionsDB, users: usersDB, results: resultsDB };
        const blob = new Blob([JSON.stringify(all, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click();
    });
    document.getElementById('restoreData').addEventListener('click', () => document.getElementById('restoreFile').click());
    document.getElementById('restoreFile').addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async (event) => {
            const restored = JSON.parse(event.target.result);
            if(restored.questions) questionsDB = restored.questions;
            if(restored.users) usersDB = restored.users;
            if(restored.results) resultsDB = restored.results;
            for(let i=1; i<=18; i++) if(questionsDB.standards[i]) await saveFileToGist(`standard-${i}.json`, questionsDB.standards[i]);
            for(let s of ['mechanics','electricity','heat_waves','modern']) if(questionsDB.subjects[s]) await saveFileToGist(`${s}.json`, questionsDB.subjects[s]);
            await saveFileToGist('users.json', usersDB);
            await saveFileToGist('results.json', resultsDB);
            alert('تمت الاستعادة');
            loadAllData();
        };
        reader.readAsText(file);
    });
    
    // ------------------- التبويبات والخروج -------------------
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        });
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('current_user_session');
        window.location.href = 'index.html';
    });
    
    // التحقق من صلاحية المالك
    const session = localStorage.getItem('current_user_session');
    if(!session) window.location.href = 'index.html';
    const user = JSON.parse(session);
    if(user.role !== 'admin') window.location.href = 'index.html';
    
    // استعادة الإعدادات المحفوظة
    if(localStorage.getItem('gist_base_url')) {
        document.getElementById('gistBaseUrl').value = localStorage.getItem('gist_base_url');
        document.getElementById('githubToken').value = localStorage.getItem('github_token');
        GIST_BASE_URL = localStorage.getItem('gist_base_url');
        GITHUB_TOKEN = localStorage.getItem('github_token');
        GIST_ID = extractGistId(GIST_BASE_URL);
        loadAllData();
    } else {
        document.getElementById('gistBaseUrl').placeholder = 'https://gist.githubusercontent.com/USER/GIST_ID/raw/';
    }
    
    function updateFieldByStandard() {
        const std = parseInt(document.getElementById('standard').value);
        const subMap = { 5:'mechanics',6:'mechanics',7:'mechanics',8:'electricity',9:'electricity',10:'electricity',11:'heat_waves',12:'heat_waves',13:'heat_waves',14:'modern',15:'modern' };
        if(subMap[std]) document.getElementById('subject').value = subMap[std];
    }
</script>
</body>
</html>
